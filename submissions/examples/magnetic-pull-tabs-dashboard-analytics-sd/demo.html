<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Magnetic Pull Tabs</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
        font-family: system-ui, sans-serif;
      }
    </style>
  </head>
  <body>
    <div class="magnetic-pull-tabs">
      <input type="radio" name="tabs" id="tab1" checked />
      <label for="tab1">Overview</label>
      <input type="radio" name="tabs" id="tab2" />
      <label for="tab2">Analytics</label>
      <input type="radio" name="tabs" id="tab3" />
      <label for="tab3">Reports</label>
      <div class="magnetic-pull-tabs__panel" id="panel1">
        Overview content here.
      </div>
      <div class="magnetic-pull-tabs__panel" id="panel2">
        Analytics content here.
      </div>
      <div class="magnetic-pull-tabs__panel" id="panel3">
        Reports content here.
      </div>
    </div>
  </body>
</html>
