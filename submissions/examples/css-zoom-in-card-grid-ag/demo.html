<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CSS Zoom-In Card Grid</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1 class="title">Creative Portfolio Showcase</h1>
    <div class="ease-zoom-grid">
      <!-- Card 1 -->
      <article class="ease-zoom-card">
        <div class="image-wrapper">
          <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=600&q=80" alt="Web Development" />
        </div>
        <div class="card-content">
          <h2>Web Development</h2>
          <p>Modern responsive layouts</p>
        </div>
      </article>
      <!-- Card 2 -->
      <article class="ease-zoom-card">
        <div class="image-wrapper">
          <img src="https://images.unsplash.com/photo-1561070791-2526d30994b5?auto=format&fit=crop&w=600&q=80" alt="UI/UX Design" />
        </div>
        <div class="card-content">
          <h2>UI/UX Design</h2>
          <p>User-centric digital experiences</p>
        </div>
      </article>
      <!-- Card 3 -->
      <article class="ease-zoom-card">
        <div class="image-wrapper">
          <img src="https://images.unsplash.com/photo-1555066931-4365d14bab8c?auto=format&fit=crop&w=600&q=80" alt="App Creation" />
        </div>
        <div class="card-content">
          <h2>App Creation</h2>
          <p>Seamless mobile integrations</p>
        </div>
      </article>
    </div>
  </main>
</body>
</html>
