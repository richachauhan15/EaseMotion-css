<!DOCTYPE html>
<html lang="en">
<head>

    <title>Rotate Fade Card Grid</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="rf-grid">

    <div class="rf-card">
        <h3>HTML</h3>
        <p>Responsive layout using semantic HTML.</p>
    </div>

    <div class="rf-card">
        <h3>CSS</h3>
        <p>Rotate and fade hover interaction.</p>
    </div>

    <div class="rf-card">
        <h3>Animation</h3>
        <p>Smooth transform with opacity effect.</p>
    </div>

    <div class="rf-card">
        <h3>Accessibility</h3>
        <p>Supports reduced motion preferences.</p>
    </div>

    <div class="rf-card">
        <h3>Performance</h3>
        <p>Pure CSS with hardware accelerated transforms.</p>
    </div>

    <div class="rf-card">
        <h3>EaseMotion</h3>
        <p>Simple reusable animation utility.</p>
    </div>

</section>

</html>
