<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Border Glow Card · Animated Gradient Border</title>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="card">
        <h2>✨ Border Glow Card</h2>
        <p class="sub">border animates with flowing gradient</p>

        <!-- === BORDER GLOW CARD === -->
        <div class="glow-card" id="glowCard">
            <div class="glow-card-inner">
                <div class="glow-icon">
                    <i class="fas fa-sparkles"></i>
                </div>
                <h3>Premium Feature</h3>
                <p>Experience the future of UI with our animated gradient border.</p>
                <button class="glow-btn">Learn More →</button>
            </div>
        </div>

        <p style="margin-top: 2rem; font-size: 0.85rem; color: #64748b;">
            Hover · watch the border glow and animate
        </p>
    </div>

    <!-- Embedded JavaScript -->
    <script>
        (function() {
            'use strict';

            const card = document.getElementById('glowCard');

            if (card) {
                // Click feedback
                card.addEventListener('click', function(e) {
                    this.classList.add('click-pulse');
                    setTimeout(() => {
                        this.classList.remove('click-pulse');
                    }, 300);
                    console.log('✨ Glow card clicked!');
                });

                // Keyboard accessibility
                card.setAttribute('tabindex', '0');
                card.setAttribute('role', 'button');
                card.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        this.click();
                    }
                });
            }

        })();
    </script>

</body>
</html>
