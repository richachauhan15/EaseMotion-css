<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perspective Tilt Tabs</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, sans-serif;
        background: #f8fafc;
        color: #1e293b;
      }
      .perspective-tilt-tabs {
        max-width: 600px;
        width: 90vw;
      }
      .perspective-tilt-tabs label {
        font-size: 0.95rem;
        font-weight: 500;
      }
      .tab-panel h2 {
        font-size: 1.25rem;
        margin-bottom: 0.5em;
      }
      .tab-panel p {
        line-height: 1.6;
        color: #475569;
      }
    </style>
  </head>
  <body>
    <div class="perspective-tilt-tabs">
      <input type="radio" name="tabs" id="tab1" checked />
      <label for="tab1">Overview</label>
      <div class="tab-panel">
        <h2>Overview</h2>
        <p>Dashboard overview with key metrics at a glance.</p>
      </div>

      <input type="radio" name="tabs" id="tab2" />
      <label for="tab2">Analytics</label>
      <div class="tab-panel">
        <h2>Analytics</h2>
        <p>Detailed analytics and data trends.</p>
      </div>

      <input type="radio" name="tabs" id="tab3" />
      <label for="tab3">Settings</label>
      <div class="tab-panel">
        <h2>Settings</h2>
        <p>Configure your dashboard preferences.</p>
      </div>
    </div>
  </body>
</html>
