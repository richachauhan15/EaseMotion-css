<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Shimmer-Sweep Progress Bar Demo — Accessible Web</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { font-family: -apple-system, "Segoe UI", sans-serif; min-height: 100vh; padding: 60px 20px; margin: 0; background: #f9fafb; }
    h2 { color: #111827; text-align: center; }
  </style>
</head>
<body>
  <h2>CSS Shimmer-Sweep Progress Bar — Accessible Web</h2>

  <div class="ease-progress">
    <div class="ease-progress__label">
      <span>Downloading</span>
      <span>72%</span>
    </div>
    <div class="ease-progress__track" role="progressbar" aria-valuenow="72" aria-valuemin="0" aria-valuemax="100" aria-label="Download progress">
      <div class="ease-progress__fill" style="width: 72%;"></div>
    </div>
  </div>
</body>
</html>
