<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion - Hover Perspective Shrink</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page">

    <header class="hero">
        <h1>ease-hover-perspective-shrink</h1>
        <p>
            Hover over the cards below to see the perspective shrink animation.
        </p>
    </header>

    <section class="cards">

        <div class="perspective">

            <div class="card">
                <div class="icon">🚀</div>
                <h2>Launch</h2>
                <p>
                    Element shrinks away using perspective and translateZ.
                </p>
            </div>

        </div>

        <div class="perspective">

            <div class="card accent">

                <div class="icon">🎨</div>

                <h2>Creative</h2>

                <p>
                    Perfect for modern dashboard interactions.
                </p>

            </div>

        </div>

        <div class="perspective">

            <div class="card">

                <div class="icon">⚡</div>

                <h2>Fast</h2>

                <p>
                    Lightweight CSS-only hover animation.
                </p>

            </div>

        </div>

    </section>

</div>

</body>
</html>
