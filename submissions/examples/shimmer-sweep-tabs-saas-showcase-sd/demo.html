<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Shimmer Sweep Tabs</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      padding: 20px;
      background-color: #f1f5f9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .demo-container {
      width: 100%;
      max-width: 480px;
    }
    .panel-content {
      padding: 24px;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      color: #475569;
      font-size: 0.95rem;
      line-height: 1.6;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }
  </style>
</head>
<body>

  <div class="demo-container">
    <div class="shimmer-sweep-tabs">
      <input type="radio" id="tab-1" name="saas-tabs" class="tab-input" checked>
      <input type="radio" id="tab-2" name="saas-tabs" class="tab-input">
      <input type="radio" id="tab-3" name="saas-tabs" class="tab-input">

      <div class="tabs-header">
        <label for="tab-1" class="tab-label">Analytics</label>
        <label for="tab-2" class="tab-label">Campaigns</label>
        <label for="tab-3" class="tab-label">Integrations</label>
      </div>

      <div class="tab-panels">
        <div class="tab-panel" id="panel-1">
          <div class="panel-content">Track live user telemetry and growth parameters instantly.</div>
        </div>
        <div class="tab-panel" id="panel-2">
          <div class="panel-content">Manage automated email pipelines and custom triggers.</div>
        </div>
        <div class="tab-panel" id="panel-3">
          <div class="panel-content">Connect data nodes to external APIs with secure webhooks.</div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
