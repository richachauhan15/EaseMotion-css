<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Peel Card · Sticky Note Peel Effect</title>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="card">
        <h2>📝 Peel Card</h2>
        <p class="sub">corner peels like a sticky note</p>

        <!-- === PEEL CARD === -->
        <div class="peel-container" id="peelContainer">
            <div class="peel-card">
                <!-- Front content -->
                <div class="peel-front">
                    <div class="peel-content">
                        <i class="fas fa-sticky-note"></i>
                        <h3>Peel me!</h3>
                        <p>Hover to peel the corner</p>
                    </div>
                </div>

                <!-- Back content (revealed when peeled) -->
                <div class="peel-back">
                    <div class="peel-content">
                        <i class="fas fa-check-circle"></i>
                        <h3>Surprise!</h3>
                        <p>You found the hidden message!</p>
                        <button class="peel-close" id="peelClose">×</button>
                    </div>
                </div>

                <!-- Peel corner (the part that lifts) -->
                <div class="peel-corner">
                    <div class="peel-fold"></div>
                </div>
            </div>
        </div>

        <p style="margin-top: 2rem; font-size: 0.85rem; color: #64748b;">
            Hover · watch the corner peel like a sticky note
        </p>
    </div>

    <!-- Embedded JavaScript -->
    <script>
        (function() {
            'use strict';

            const container = document.getElementById('peelContainer');
            const card = container.querySelector('.peel-card');
            const closeBtn = document.getElementById('peelClose');
            let isPeeled = false;

            // --- Peel function ---
            function peelCard() {
                if (isPeeled) return;
                isPeeled = true;
                card.classList.add('peeled');
                console.log('📝 Card peeled!');
            }

            // --- Unpeel function ---
            function unpeelCard() {
                if (!isPeeled) return;
                isPeeled = false;
                card.classList.remove('peeled');
                console.log('📝 Card unpeeled');
            }

            // --- Toggle function ---
            function togglePeel() {
                if (isPeeled) {
                    unpeelCard();
                } else {
                    peelCard();
                }
            }

            // --- Event Listeners ---

            // Hover to peel
            container.addEventListener('mouseenter', peelCard);
            container.addEventListener('mouseleave', unpeelCard);

            // Click to toggle (for mobile)
            container.addEventListener('click', function(e) {
                // Don't toggle if clicking the close button
                if (e.target.closest('.peel-close')) return;
                togglePeel();
            });

            // Close button to unpeel
            if (closeBtn) {
                closeBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    unpeelCard();
                });
            }

            // Keyboard accessibility
            container.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    togglePeel();
                }
            });

            // Make the container focusable for keyboard users
            container.setAttribute('tabindex', '0');
            container.setAttribute('role', 'button');
            container.setAttribute('aria-label', 'Peel card to reveal content');

            // Trigger initial peel on load for demo
            setTimeout(() => {
                peelCard();
                setTimeout(() => {
                    unpeelCard();
                }, 2500);
            }, 500);

        })();
    </script>

</body>
</html>
