<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zoom-In Badge — EaseMotion CSS</title>
  <link rel="stylesheet" href="./style.css">
  <style>
    body {
      background: #06070c;
      background-image:
        radial-gradient(ellipse at 20% 30%, rgba(244, 63, 94, 0.1) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 70%, rgba(16, 185, 129, 0.08) 0%, transparent 55%);
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .page-header {
      text-align: center;
      margin-bottom: 3rem;
    }
    .page-header h1 {
      font-size: 1.85rem;
      font-weight: 800;
      background: linear-gradient(135deg, #f43f5e, #10b981);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0 0 0.4rem;
      letter-spacing: -0.015em;
    }
    .page-header p {
      color: #475569;
      font-size: 0.88rem;
      margin: 0;
    }
  </style>
</head>
<body>

  <div class="page-header">
    <h1>Creative Studio Badges</h1>
    <p>Hover over the portfolio cards to zoom-in the floating status badge using spring physics.</p>
  </div>

  <!-- Portfolio grid layout -->
  <div class="portfolio-grid">

    <!-- Card 1: Rose Hot Badge -->
    <article class="portfolio-card" tabindex="0">
      <!-- Floating Badge Container -->
      <div class="floating-badge-container">
        <span class="ease-zoom-badge badge-rose">
          <span class="badge-pulse-dot"></span>Hot
        </span>
      </div>
      
      <div class="thumbnail-box">
        <svg width="100%" height="100%" viewBox="0 0 240 140" xmlns="http://www.w3.org/2000/svg">
          <rect width="240" height="140" fill="#090a10"/>
          <polygon points="120,40 155,100 85,100" fill="rgba(244,63,94,0.12)" stroke="#f43f5e" stroke-width="2"/>
        </svg>
      </div>
      <div class="portfolio-info">
        <h2 class="portfolio-title">Geometric Prisms</h2>
        <span class="portfolio-category">3D Vector Graphics</span>
      </div>
    </article>

    <!-- Card 2: Emerald New Badge -->
    <article class="portfolio-card" tabindex="0">
      <div class="floating-badge-container">
        <span class="ease-zoom-badge badge-emerald">
          <span class="badge-pulse-dot"></span>New
        </span>
      </div>
      
      <div class="thumbnail-box">
        <svg width="100%" height="100%" viewBox="0 0 240 140" xmlns="http://www.w3.org/2000/svg">
          <rect width="240" height="140" fill="#090a10"/>
          <circle cx="120" cy="70" r="30" fill="rgba(16,185,129,0.15)" stroke="#10b981" stroke-width="2"/>
        </svg>
      </div>
      <div class="portfolio-info">
        <h2 class="portfolio-title">Eco System Dashboard</h2>
        <span class="portfolio-category">UI/UX Design</span>
      </div>
    </article>

    <!-- Card 3: Amber Featured Badge -->
    <article class="portfolio-card" tabindex="0">
      <div class="floating-badge-container">
        <span class="ease-zoom-badge badge-amber">
          <span class="badge-pulse-dot"></span>Featured
        </span>
      </div>
      
      <div class="thumbnail-box">
        <svg width="100%" height="100%" viewBox="0 0 240 140" xmlns="http://www.w3.org/2000/svg">
          <rect width="240" height="140" fill="#090a10"/>
          <rect x="85" y="45" width="70" height="50" rx="8" fill="rgba(245,158,11,0.12)" stroke="#f59e0b" stroke-width="2"/>
        </svg>
      </div>
      <div class="portfolio-info">
        <h2 class="portfolio-title">Web Space Labs</h2>
        <span class="portfolio-category">Development</span>
      </div>
    </article>

  </div>

</body>
</html>
