<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloud Resource Tag Compliance</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<section class="dashboard">

<h2>Cloud Resource Tag Compliance</h2>

<div class="card success">
<div>
<h3>Production Resources</h3>
<p>842 resources correctly tagged.</p>
</div>
<span>100%</span>
</div>

<div class="card info">
<div>
<h3>Development Resources</h3>
<p>Tag synchronization running.</p>
</div>
<span>Syncing</span>
</div>

<div class="card warning">
<div>
<h3>Missing Owner Tag</h3>
<p>18 virtual machines require owner assignment.</p>
</div>
<span>Review</span>
</div>

<div class="card danger">
<div>
<h3>Policy Violations</h3>
<p>7 resources blocked from deployment.</p>
</div>
<span>Critical</span>
</div>

</section>

</body>
</html>
