<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Infrastructure Change Audit Board</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="dashboard">

<h2>Infrastructure Change Audit</h2>

<div class="audit healthy">
<div>
<h3>Network Policy</h3>
<p>Approved and deployed successfully</p>
</div>
<span>Verified</span>
</div>

<div class="audit active">
<div>
<h3>Load Balancer</h3>
<p>Configuration update awaiting validation</p>
</div>
<span>Review</span>
</div>

<div class="audit warning">
<div>
<h3>IAM Policy</h3>
<p>Privilege escalation requires approval</p>
</div>
<span>Pending</span>
</div>

<div class="audit critical">
<div>
<h3>Storage Bucket</h3>
<p>Unauthorized permission change detected</p>
</div>
<span>Alert</span>
</div>

</section>

</body>
</html>
