<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Floating Orbit Tabs</title>
    <link rel="stylesheet" href="./style.css" />
    <style>
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: #f8fafc;
      }
    </style>
  </head>
  <body>
    <div class="floating-orbit-tabs">
      <input type="radio" name="tabs" id="tab-1" checked />
      <label for="tab-1">Shipping</label>

      <input type="radio" name="tabs" id="tab-2" />
      <label for="tab-2">Payment</label>

      <input type="radio" name="tabs" id="tab-3" />
      <label for="tab-3">Review</label>

      <div class="tab-panel" id="panel-1">
        <h3>Shipping</h3>
        <p>Select your preferred shipping method.</p>
      </div>

      <div class="tab-panel" id="panel-2">
        <h3>Payment</h3>
        <p>Choose a payment method to complete your order.</p>
      </div>

      <div class="tab-panel" id="panel-3">
        <h3>Review</h3>
        <p>Review your order before placing it.</p>
      </div>
    </div>
  </body>
</html>
