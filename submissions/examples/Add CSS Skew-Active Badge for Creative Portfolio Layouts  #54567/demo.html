<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Skew-Active Badge</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <header class="showcase-header">
            <h1>Skew-Active Badges</h1>
            <p>Dynamic, slanted badges with striking hover and active state transformations.</p>
        </header>

        <section class="badges-container">
            <div class="badge-group">
                <h3>Portfolio Categories</h3>
                <div class="badges">
                    <a href="#" class="badge active">
                        <span class="badge-content">All Work</span>
                    </a>
                    <a href="#" class="badge">
                        <span class="badge-content">Branding</span>
                    </a>
                    <a href="#" class="badge">
                        <span class="badge-content">UI/UX Design</span>
                    </a>
                    <a href="#" class="badge">
                        <span class="badge-content">Motion Graphics</span>
                    </a>
                </div>
            </div>

            <div class="badge-group">
                <h3>Status Indicators</h3>
                <div class="badges">
                    <span class="badge status-new">
                        <span class="badge-content">New Release</span>
                    </span>
                    <span class="badge status-pro">
                        <span class="badge-content">Pro Feature</span>
                    </span>
                    <span class="badge status-update">
                        <span class="badge-content">Updated</span>
                    </span>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
