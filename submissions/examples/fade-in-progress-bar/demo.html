<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Fade-In Progress Bar - EaseMotion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="dashboard-wrapper">
        <header class="dashboard-header">
            <h1>System Resources</h1>
            <p>Hover over the cards to re-trigger the smooth fade-in progress effect.</p>
        </header>

        <div class="em-progress-grid">
            <!-- Progress Card 1 -->
            <div class="em-progress-card">
                <div class="em-progress-header">
                    <h3>Cloud Storage</h3>
                    <span>75%</span>
                </div>
                <div class="em-progress-track">
                    <!-- The --target-width variable controls the fill amount -->
                    <div class="em-progress-fill" style="--target-width: 75%; --fill-color: #3b82f6;"></div>
                </div>
                <p class="em-progress-desc">750 GB of 1 TB used</p>
            </div>

            <!-- Progress Card 2 -->
            <div class="em-progress-card">
                <div class="em-progress-header">
                    <h3>Monthly Bandwidth</h3>
                    <span>42%</span>
                </div>
                <div class="em-progress-track">
                    <div class="em-progress-fill" style="--target-width: 42%; --fill-color: #10b981;"></div>
                </div>
                <p class="em-progress-desc">420 GB of 1,000 GB used</p>
            </div>

            <!-- Progress Card 3 -->
            <div class="em-progress-card">
                <div class="em-progress-header">
                    <h3>CPU Utilization</h3>
                    <span>89%</span>
                </div>
                <div class="em-progress-track">
                    <div class="em-progress-fill warning" style="--target-width: 89%; --fill-color: #ef4444;"></div>
                </div>
                <p class="em-progress-desc">High load detected</p>
            </div>
        </div>
    </main>
</body>
</html>
