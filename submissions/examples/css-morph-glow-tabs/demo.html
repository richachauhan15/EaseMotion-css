<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Morph Glow Tabs</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="tabs">

    <input type="radio" name="tab" id="home" checked>
    <input type="radio" name="tab" id="projects">
    <input type="radio" name="tab" id="contact">

    <div class="tab-buttons">
        <label for="home">Home</label>
        <label for="projects">Projects</label>
        <label for="contact">Contact</label>
    </div>

    <div class="tab-content">
        <div class="content home">
            <h2>Home</h2>
            <p>Welcome to the Creative Portfolio with Morph Glow Tabs.</p>
        </div>

        <div class="content projects">
            <h2>Projects</h2>
            <p>Explore modern UI animations built using pure HTML and CSS.</p>
        </div>

        <div class="content contact">
            <h2>Contact</h2>
            <p>Connect with us to build beautiful web experiences.</p>
        </div>
    </div>

</div>

</body>
</html>
