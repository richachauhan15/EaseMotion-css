<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creative Portfolio - Float-Drift Badge Showcase</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="portfolio-badge-canvas">
    <div class="portfolio-card-frame">
      
      <div class="card-meta-header">
        <span class="category-tag">DEEP TECH DEPLOYMENT</span>
        <h3>Space Robotics Architecture</h3>
      </div>

      <div class="card-preview-container">
        <!-- Pure CSS Floating Drift Badges -->
        <div class="float-drift-badge top-right-badge" style="--drift-delay: 0s;">
          <span class="badge-pulse-dot"></span>
          <span class="badge-label">UK Design Registered</span>
        </div>

        <div class="float-drift-badge bottom-left-badge" style="--drift-delay: 1.5s;">
          <span class="badge-icon">🚀</span>
          <span class="badge-label">v2.4 Active Node</span>
        </div>

        <div class="card-mock-visual">
          <div class="visual-node-core"></div>
        </div>
      </div>

      <p class="panel-caption-footer">Badges execute continuous organic float-drift trajectories over visual nodes.</p>
    </div>
  </main>

</body>
</html>
