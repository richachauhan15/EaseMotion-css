<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Print Optimized Chip Component</title>
    <style>
        /* Base Environment (Screen View) */
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0f172a; /* Dark background for screen */
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 2rem;
        }

        .demo-container {
            background: #1e293b;
            padding: 3rem;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #334155;
            max-width: 600px;
        }

        /* 
           ====================================================
           EaseMotion Chip Component (Screen Styles)
           ====================================================
        */
        .ease-chip-container-ag {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin: 2rem 0;
            flex-wrap: wrap;
        }

        .ease-chip-ag {
            display: inline-flex;
            align-items: center;
            padding: 0.35rem 1rem;
            border-radius: 9999px; /* Pill shape */
            font-size: 0.875rem;
            font-weight: 600;
            letter-spacing: 0.025em;
            text-transform: uppercase;
        }

        /* Solid Color Variants for Screen */
        .ease-chip-ag.primary {
            background-color: #3b82f6; /* Blue */
            color: #ffffff;
        }
        
        .ease-chip-ag.success {
            background-color: #10b981; /* Green */
            color: #ffffff;
        }

        .ease-chip-ag.warning {
            background-color: #f59e0b; /* Orange */
            color: #ffffff;
        }

        /* Utility button to test printing */
        .print-btn-ag {
            background-color: #6366f1;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 1rem;
        }

        .print-btn-ag:hover {
            background-color: #4f46e5;
        }

        /* 
           ====================================================
           CRITICAL: Print Optimization Logic (@media print)
           ====================================================
           These styles only activate when the user prints the page (Ctrl+P).
           It ensures the chips are legible on paper and saves printer ink.
        */
        @media print {
            /* Force background to white for printing */
            body, .demo-container {
                background: white !important;
                color: black !important;
                border: none !important;
                box-shadow: none !important;
            }

            /* Convert colorful chips to clean, ink-saving outlines */
            .ease-chip-ag {
                background-color: transparent !important;
                color: #000000 !important;
                border: 1px solid #000000 !important;
                /* Optional: Ensures browsers don't try to force background graphics */
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            /* Hide interactive elements that have no use on paper */
            .no-print-ag {
                display: none !important;
            }
        }
    </style>
</head>
<body>

    <div class="demo-container">
        <h2>Print Optimized Chips</h2>
        <p>Press the button below (or Ctrl+P / Cmd+P) to see how these colorful chips automatically convert into ink-saving, legible outline badges on paper.</p>
        
        <!-- Chip Showcase -->
        <div class="ease-chip-container-ag">
            <span class="ease-chip-ag primary">React JS</span>
            <span class="ease-chip-ag success">Approved</span>
            <span class="ease-chip-ag warning">Pending</span>
        </div>

        <!-- Print Trigger (Hidden during actual print) -->
        <button class="print-btn-ag no-print-ag" onclick="window.print()">
            🖨️ Open Print Preview
        </button>
    </div>

</body>
</html>
