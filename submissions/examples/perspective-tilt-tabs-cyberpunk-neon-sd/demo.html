<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perspective Tilt Tabs</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0a0a;
        font-family: system-ui, sans-serif;
      }
      .perspective-tilt-tabs {
        width: 400px;
        max-width: 90vw;
      }
    </style>
  </head>
  <body>
    <div class="perspective-tilt-tabs">
      <input type="radio" name="tabs" id="tab1" checked />
      <input type="radio" name="tabs" id="tab2" />
      <input type="radio" name="tabs" id="tab3" />
      <nav>
        <label for="tab1">Neon</label>
        <label for="tab2">Cyber</label>
        <label for="tab3">Pulse</label>
      </nav>
      <div class="tabs-content">
        <div class="tab-content" id="content1">
          <h3>Neon Glow</h3>
          <p>
            Tab content with a cyberpunk neon aesthetic and 3D perspective tilt.
          </p>
        </div>
        <div class="tab-content" id="content2">
          <h3>Cyber Future</h3>
          <p>
            Pure CSS tabs with smooth transitions and keyboard accessibility.
          </p>
        </div>
        <div class="tab-content" id="content3">
          <h3>Pulse Wave</h3>
          <p>Responsive and minimal. Customize via CSS custom properties.</p>
        </div>
      </div>
    </div>
  </body>
</html>
