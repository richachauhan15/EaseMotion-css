<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Persistent Volume Health Overview</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<section class="dashboard">

<h2>Persistent Volume Health</h2>

<div class="volume healthy">
<div>
<h3>pv-database-01</h3>
<p>Volume is mounted and operating normally.</p>
</div>
<span>Healthy</span>
</div>

<div class="volume active">
<div>
<h3>pv-backup-02</h3>
<p>Storage expansion request is in progress.</p>
</div>
<span>Expanding</span>
</div>

<div class="volume warning">
<div>
<h3>pv-logs-03</h3>
<p>Disk utilization has exceeded 85%.</p>
</div>
<span>Warning</span>
</div>

<div class="volume critical">
<div>
<h3>pv-analytics-04</h3>
<p>Volume attachment failed on target node.</p>
</div>
<span>Critical</span>
</div>

</section>

</body>
</html>
