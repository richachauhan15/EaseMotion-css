<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Scale-Hover Stepper - EaseMotion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="dashboard-wrapper">
        <header class="dashboard-header">
            <h1>Deployment Progress</h1>
            <p>Hover over the steps to see the pure CSS scale effect.</p>
        </header>

        <div class="em-stepper-container">
            <!-- Step 1: Completed -->
            <div class="em-step completed">
                <div class="em-step-indicator">
                    <span class="em-step-icon">✓</span>
                </div>
                <div class="em-step-content">
                    <h3>Build</h3>
                    <p>Compiled successfully</p>
                </div>
            </div>

            <!-- Step 2: Completed -->
            <div class="em-step completed">
                <div class="em-step-indicator">
                    <span class="em-step-icon">✓</span>
                </div>
                <div class="em-step-content">
                    <h3>Test</h3>
                    <p>All tests passed</p>
                </div>
            </div>

            <!-- Step 3: Active -->
            <div class="em-step active">
                <div class="em-step-indicator">
                    <span class="em-step-icon">3</span>
                </div>
                <div class="em-step-content">
                    <h3>Deploy</h3>
                    <p>Pushing to server...</p>
                </div>
            </div>
            
            <!-- Step 4: Pending -->
            <div class="em-step pending">
                <div class="em-step-indicator">
                    <span class="em-step-icon">4</span>
                </div>
                <div class="em-step-content">
                    <h3>Verify</h3>
                    <p>Awaiting health check</p>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
