<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Bounce Pulse Tabs</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="tabs">

    <input type="radio" name="tab" id="tab1" checked>
    <input type="radio" name="tab" id="tab2">
    <input type="radio" name="tab" id="tab3">

    <div class="tab-buttons">
        <label for="tab1">Home</label>
        <label for="tab2">Projects</label>
        <label for="tab3">Contact</label>
    </div>

    <div class="contents">
        <div class="content home">
            <h2>Home</h2>
            <p>Welcome to the Bounce Pulse Tabs component.</p>
        </div>

        <div class="content projects">
            <h2>Projects</h2>
            <p>Explore creative portfolio animations using pure HTML & CSS.</p>
        </div>

        <div class="content contact">
            <h2>Contact</h2>
            <p>Get in touch for collaboration and creative ideas.</p>
        </div>
    </div>

</div>

</body>
</html>
