<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pulse Border Animation Demo</title>
    <link rel="stylesheet" href="./style.css" />
    <style>
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        background-color: #f8fafc;
        color: #0f172a;
      }
      .demo-container {
        text-align: center;
      }
      .btn-demo {
        padding: 0.75rem 1.5rem;
        font-size: 1rem;
        font-weight: 600;
        color: #ffffff;
        background-color: #3b82f6;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        outline: none;
      }
      h1 {
        margin-bottom: 2rem;
        font-size: 1.5rem;
      }
    </style>
  </head>
  <body>
    <div class="demo-container">
      <h1>Pulse Border Animation</h1>
      <button class="btn-demo pulse-border-sd">Pulsing Button</button>
    </div>
  </body>
</html>
