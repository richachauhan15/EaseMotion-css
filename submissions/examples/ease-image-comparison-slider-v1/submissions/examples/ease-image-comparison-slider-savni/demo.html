<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ease Image Comparison Slider — Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-wrap: wrap;
      gap: 30px;
      align-items: center;
      justify-content: center;
      padding: 40px;
      background: #0f172a;
      font-family: system-ui, sans-serif;
    }
    .demo-block { display: flex; flex-direction: column; gap: 10px; align-items: center; }
    .demo-block p { color: #94a3b8; font-size: 0.85rem; margin: 0; }
  </style>
</head>
<body>

  <div class="demo-block">
    <p>Drag-to-reveal (horizontal)</p>
    <div class="ease-image-comparison-slider">
      <img class="ease-after" src="https://images.unsplash.com/photo-1487958449943-2429e8be8625?w=800&q=60" alt="After" />
      <img class="ease-before" src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=800&q=60&sat=-100" alt="Before" />
      <input type="range" class="slider-range" min="0" max="100" value="50" aria-label="Comparison position" />
      <div class="slider-divider"></div>
      <div class="slider-handle">
        <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"></polyline><polyline points="15 6 9 12 15 18" transform="translate(0,0)"></polyline></svg>
      </div>
      <span class="slider-label label-before">Before</span>
      <span class="slider-label label-after">After</span>
    </div>
  </div>

  <div class="demo-block">
    <p>Auto-animated sweep demo</p>
    <div class="ease-image-comparison-slider is-auto-sweep">
      <img class="ease-after" src="https://images.unsplash.com/photo-1487958449943-2429e8be8625?w=800&q=60" alt="After" />
      <img class="ease-before" src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=800&q=60&sat=-100" alt="Before" />
      <input type="range" class="slider-range" min="0" max="100" value="50" aria-label="Comparison position" tabindex="-1" />
      <div class="slider-divider"></div>
      <div class="slider-handle">
        <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"></polyline></svg>
      </div>
      <span class="slider-label label-before">Before</span>
      <span class="slider-label label-after">After</span>
    </div>
  </div>

  <div class="demo-block">
    <p>Vertical orientation</p>
    <div class="ease-image-comparison-slider is-vertical" style="aspect-ratio: 10/13;">
      <img class="ease-after" src="https://images.unsplash.com/photo-1487958449943-2429e8be8625?w=800&q=60" alt="After" />
      <img class="ease-before" src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=800&q=60&sat=-100" alt="Before" />
      <input type="range" class="slider-range" min="0" max="100" value="50" aria-label="Comparison position" />
      <div class="slider-divider"></div>
      <div class="slider-handle">
        <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"></polyline></svg>
      </div>
      <span class="slider-label label-before">Before</span>
      <span class="slider-label label-after">After</span>
    </div>
  </div>

  <script src="comparison-slider.js"></script>
</body>
</html>
