<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Floating Orbit Tabs</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        font-family: system-ui, sans-serif;
      }
      .floating-orbit-tabs {
        width: 480px;
        max-width: 90vw;
      }
    </style>
  </head>
  <body>
    <div class="floating-orbit-tabs">
      <input type="radio" name="tabs" id="tab1" checked />
      <label for="tab1">Featured</label>
      <input type="radio" name="tabs" id="tab2" />
      <label for="tab2">New Arrivals</label>
      <input type="radio" name="tabs" id="tab3" />
      <label for="tab3">Sale</label>
      <div class="floating-orbit-tabs__panel">Featured products content.</div>
      <div class="floating-orbit-tabs__panel">New arrivals content.</div>
      <div class="floating-orbit-tabs__panel">Sale items content.</div>
    </div>
  </body>
</html>
