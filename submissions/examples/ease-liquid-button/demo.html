<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Liquid Button · Fluid Background Flow</title>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="card">
        <h2>💧 Liquid Button</h2>
        <p class="sub">background flows like fluid on hover</p>

        <!-- === LIQUID BUTTON === -->
        <button class="liquid-btn" id="liquidButton">
            <!-- Liquid wave layers -->
            <span class="liquid-wave wave-1"></span>
            <span class="liquid-wave wave-2"></span>
            <span class="liquid-wave wave-3"></span>

            <!-- Button content -->
            <span class="btn-content">
                <i class="fas fa-water"></i>
                <span>Flow</span>
            </span>
        </button>

        <p style="margin-top: 2rem; font-size: 0.85rem; color: #64748b;">
            Hover · watch the liquid flow with mesmerizing waves
        </p>
    </div>

    <!-- Embedded JavaScript -->
    <script>
        (function() {
            'use strict';

            const button = document.getElementById('liquidButton');

            if (button) {
                // Click feedback
                button.addEventListener('click', function(e) {
                    this.classList.add('click-pulse');
                    setTimeout(() => {
                        this.classList.remove('click-pulse');
                    }, 300);

                    // Reset and replay liquid animation
                    const waves = this.querySelectorAll('.liquid-wave');
                    waves.forEach(wave => {
                        wave.classList.remove('flowing');
                        void wave.offsetWidth;
                        wave.classList.add('flowing');
                    });

                    console.log('💧 Liquid flow triggered!');
                });

                // Trigger initial animation on load for demo
                setTimeout(() => {
                    const waves = button.querySelectorAll('.liquid-wave');
                    waves.forEach(wave => {
                        wave.classList.add('flowing');
                    });
                }, 500);

                // Mouse enter - ensure waves are flowing
                button.addEventListener('mouseenter', function() {
                    const waves = this.querySelectorAll('.liquid-wave');
                    waves.forEach(wave => {
                        if (!wave.classList.contains('flowing')) {
                            wave.classList.add('flowing');
                        }
                    });
                });
            }

        })();
    </script>

</body>
</html>
