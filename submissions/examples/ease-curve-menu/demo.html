<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Curve Menu · Curved Path Animation</title>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="card">
        <h2>🌊 Curve Menu</h2>
        <p class="sub">items follow a curved path</p>

        <!-- === CURVE MENU === -->
        <div class="curve-menu" id="curveMenu">
            <button class="curve-toggle" id="curveToggle" aria-label="Toggle menu">
                <i class="fas fa-plus"></i>
            </button>

            <ul class="curve-items" id="curveItems">
                <li>
                    <button class="curve-item" data-tooltip="Home">
                        <i class="fas fa-home"></i>
                    </button>
                    <span class="tooltip">Home</span>
                </li>
                <li>
                    <button class="curve-item" data-tooltip="Search">
                        <i class="fas fa-search"></i>
                    </button>
                    <span class="tooltip">Search</span>
                </li>
                <li>
                    <button class="curve-item" data-tooltip="Messages">
                        <i class="fas fa-envelope"></i>
                    </button>
                    <span class="tooltip">Messages</span>
                </li>
                <li>
                    <button class="curve-item" data-tooltip="Notifications">
                        <i class="fas fa-bell"></i>
                    </button>
                    <span class="tooltip">Notifications</span>
                </li>
                <li>
                    <button class="curve-item" data-tooltip="Profile">
                        <i class="fas fa-user"></i>
                    </button>
                    <span class="tooltip">Profile</span>
                </li>
                <li>
                    <button class="curve-item" data-tooltip="Settings">
                        <i class="fas fa-cog"></i>
                    </button>
                    <span class="tooltip">Settings</span>
                </li>
            </ul>
        </div>

        <p style="margin-top: 2rem; font-size: 0.85rem; color: #64748b;">
            Click · watch items follow a curved path
        </p>
    </div>

    <!-- Embedded JavaScript -->
    <script>
        (function() {
            'use strict';

            const menu = document.getElementById('curveMenu');
            const toggle = document.getElementById('curveToggle');
            const items = document.getElementById('curveItems');
            const itemButtons = document.querySelectorAll('.curve-item');
            let isOpen = false;

            // --- Toggle Menu ---
            function toggleMenu() {
                isOpen = !isOpen;
                menu.classList.toggle('is-open', isOpen);
                toggle.classList.toggle('is-active', isOpen);

                const icon = toggle.querySelector('i');
                if (isOpen) {
                    icon.className = 'fas fa-times';
                } else {
                    icon.className = 'fas fa-plus';
                }

                console.log(`🌊 Curve menu ${isOpen ? 'opened' : 'closed'}`);
            }

            // --- Open Menu ---
            function openMenu() {
                if (isOpen) return;
                toggleMenu();
            }

            // --- Close Menu ---
            function closeMenu() {
                if (!isOpen) return;
                toggleMenu();
            }

            // --- Event Listeners ---

            // Toggle button
            toggle.addEventListener('click', function(e) {
                e.stopPropagation();
                toggleMenu();
                this.classList.add('click-pulse');
                setTimeout(() => {
                    this.classList.remove('click-pulse');
                }, 300);
            });

            // Item clicks
            itemButtons.forEach((btn, index) => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const label = this.getAttribute('data-tooltip') || 'Item';
                    console.log(`🌊 Selected: ${label}`);

                    this.classList.add('clicked');
                    setTimeout(() => {
                        this.classList.remove('clicked');
                    }, 300);

                    setTimeout(() => {
                        closeMenu();
                    }, 400);
                });
            });

            // Click outside to close
            document.addEventListener('click', function(e) {
                if (!menu.contains(e.target)) {
                    closeMenu();
                }
            });

            // Keyboard accessibility
            toggle.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    toggleMenu();
                }
            });

            itemButtons.forEach(btn => {
                btn.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        this.click();
                    }
                    if (e.key === 'Escape') {
                        closeMenu();
                    }
                });
            });

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && isOpen) {
                    closeMenu();
                    toggle.focus();
                }
            });

            // Auto-open demo on load
            setTimeout(() => {
                openMenu();
                setTimeout(() => {
                    closeMenu();
                }, 3000);
            }, 500);

        })();
    </script>

</body>
</html>
