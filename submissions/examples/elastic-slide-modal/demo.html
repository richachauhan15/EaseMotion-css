<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elastic Slide Modal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="modal-demo">

    <input type="checkbox" id="modal-toggle">

    <label for="modal-toggle" class="open-btn">
        Open Modal
    </label>

    <div class="overlay"></div>

    <div class="modal">
        <h2>Elastic Slide Modal</h2>

        <p>
            This responsive modal uses only HTML and CSS with a smooth
            elastic slide animation.
        </p>

        <label for="modal-toggle" class="close-btn">
            Close
        </label>
    </div>

</div>

</body>
</html>
