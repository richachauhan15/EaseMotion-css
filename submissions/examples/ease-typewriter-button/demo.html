<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Typewriter Button · Self-Typing Text</title>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="card">
        <h2>⌨️ Typewriter Button</h2>
        <p class="sub">text types itself on hover</p>

        <!-- === TYPEWRITER BUTTON === -->
        <button class="typewriter-btn" id="typewriterButton">
            <span class="typewriter-text">
                <span class="cursor">|</span>
            </span>
            <span class="typewriter-icon"><i class="fas fa-keyboard"></i></span>
        </button>

        <p style="margin-top: 2rem; font-size: 0.85rem; color: #64748b;">
            Hover · watch the text type itself like a typewriter
        </p>
    </div>

    <!-- Embedded JavaScript -->
    <script>
        (function() {
            'use strict';

            const button = document.getElementById('typewriterButton');
            const textElement = button.querySelector('.typewriter-text');
            const cursorElement = textElement.querySelector('.cursor');

            // The text to type
            const fullText = "Click me!";
            let isTyping = false;
            let timeoutId = null;

            function typeText() {
                if (isTyping) return;
                isTyping = true;

                // Reset text (keep cursor)
                textElement.innerHTML = '<span class="cursor">|</span>';
                const cursor = textElement.querySelector('.cursor');

                let charIndex = 0;

                function typeNextChar() {
                    if (charIndex < fullText.length) {
                        // Insert the next character before the cursor
                        const char = fullText[charIndex];
                        const textNode = document.createTextNode(char);
                        textElement.insertBefore(textNode, cursor);
                        charIndex++;

                        // Random delay for realistic typing (50-150ms)
                        const delay = 50 + Math.random() * 100;
                        timeoutId = setTimeout(typeNextChar, delay);
                    } else {
                        // Typing complete
                        isTyping = false;
                        cursor.style.animation = 'blink 0.7s step-end infinite';
                        console.log('⌨️ Typing complete!');
                    }
                }

                // Start typing
                typeNextChar();
            }

            function resetText() {
                // Clear any ongoing typing
                if (timeoutId) {
                    clearTimeout(timeoutId);
                    timeoutId = null;
                }

                // Reset to initial state with cursor
                textElement.innerHTML = '<span class="cursor">|</span>';
                isTyping = false;
                const cursor = textElement.querySelector('.cursor');
                cursor.style.animation = 'blink 0.7s step-end infinite';
            }

            // --- Event Listeners ---
            button.addEventListener('mouseenter', function() {
                // Reset first to ensure clean state
                resetText();
                // Start typing after a small delay
                setTimeout(() => {
                    typeText();
                }, 200);
                // Add class for styling
                this.classList.add('typing');
            });

            button.addEventListener('mouseleave', function() {
                // Reset the text
                resetText();
                this.classList.remove('typing');
            });

            // Click feedback
            button.addEventListener('click', function(e) {
                this.classList.add('click-pulse');
                setTimeout(() => {
                    this.classList.remove('click-pulse');
                }, 300);

                // Restart typing on click
                resetText();
                setTimeout(() => {
                    typeText();
                }, 300);

                console.log('⌨️ Typewriter triggered!');
            });

            // Keyboard accessibility
            button.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    this.click();
                }
            });

            // Trigger initial typing on load for demo
            setTimeout(() => {
                button.classList.add('typing');
                typeText();
                setTimeout(() => {
                    resetText();
                    button.classList.remove('typing');
                }, 2500);
            }, 500);

        })();
    </script>

</body>
</html>
