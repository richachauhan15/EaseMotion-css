<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creative Portfolio - Scale-Hover Tooltip Showcase</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="portfolio-tooltip-canvas">
    <div class="portfolio-card-frame">
      
      <div class="card-meta-header">
        <span class="category-tag">FULL-STACK AI SYSTEM</span>
        <h3>Cyberbullying Detection System</h3>
      </div>

      <div class="tooltip-display-area">
        <!-- Pure CSS Scale-Hover Tooltip Wrapper -->
        <div class="scale-hover-tooltip-container">
          <button class="tooltip-trigger-btn" aria-describedby="tooltip-info">
            <span>Inspect Tech Stack</span>
          </button>

          <div id="tooltip-info" class="scale-tooltip-card" role="tooltip">
            <div class="tooltip-arrow-node"></div>
            <div class="tooltip-content-body">
              <h4>NLP Pipeline v2</h4>
              <p>Built with Python, MongoDB, and TypeScript for real-time inference.</p>
            </div>
          </div>
        </div>
      </div>

      <p class="panel-caption-footer">Hover or focus the button to trigger smooth spring scale-hover tooltip transformations.</p>
    </div>
  </main>

</body>
</html>
