<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pivot Menu · Rotating Sub-items</title>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="card">
        <h2>🔄 Pivot Menu</h2>
        <p class="sub">rotates to reveal sub-items</p>

        <!-- === PIVOT MENU === -->
        <div class="pivot-menu" id="pivotMenu">
            <button class="pivot-toggle" id="pivotToggle" aria-label="Toggle menu">
                <span class="pivot-icon">
                    <i class="fas fa-chevron-down"></i>
                </span>
            </button>

            <ul class="pivot-items" id="pivotItems">
                <li>
                    <button class="pivot-item" data-tooltip="Dashboard">
                        <i class="fas fa-chart-pie"></i>
                    </button>
                    <span class="tooltip">Dashboard</span>
                </li>
                <li>
                    <button class="pivot-item" data-tooltip="Analytics">
                        <i class="fas fa-chart-line"></i>
                    </button>
                    <span class="tooltip">Analytics</span>
                </li>
                <li>
                    <button class="pivot-item" data-tooltip="Reports">
                        <i class="fas fa-file-alt"></i>
                    </button>
                    <span class="tooltip">Reports</span>
                </li>
                <li>
                    <button class="pivot-item" data-tooltip="Settings">
                        <i class="fas fa-cog"></i>
                    </button>
                    <span class="tooltip">Settings</span>
                </li>
            </ul>
        </div>

        <p style="margin-top: 2rem; font-size: 0.85rem; color: #64748b;">
            Click · watch the menu pivot and reveal sub-items
        </p>
    </div>

    <!-- Embedded JavaScript -->
    <script>
        (function() {
            'use strict';

            const menu = document.getElementById('pivotMenu');
            const toggle = document.getElementById('pivotToggle');
            const items = document.getElementById('pivotItems');
            const itemButtons = document.querySelectorAll('.pivot-item');
            let isOpen = false;

            // --- Toggle Menu ---
            function toggleMenu() {
                isOpen = !isOpen;
                menu.classList.toggle('is-open', isOpen);
                toggle.classList.toggle('is-active', isOpen);

                console.log(`🔄 Pivot menu ${isOpen ? 'opened' : 'closed'}`);
            }

            // --- Open Menu ---
            function openMenu() {
                if (isOpen) return;
                toggleMenu();
            }

            // --- Close Menu ---
            function closeMenu() {
                if (!isOpen) return;
                toggleMenu();
            }

            // --- Event Listeners ---

            // Toggle button
            toggle.addEventListener('click', function(e) {
                e.stopPropagation();
                toggleMenu();
                this.classList.add('click-pulse');
                setTimeout(() => {
                    this.classList.remove('click-pulse');
                }, 300);
            });

            // Item clicks
            itemButtons.forEach((btn, index) => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const label = this.getAttribute('data-tooltip') || 'Item';
                    console.log(`🔄 Selected: ${label}`);

                    this.classList.add('clicked');
                    setTimeout(() => {
                        this.classList.remove('clicked');
                    }, 300);

                    setTimeout(() => {
                        closeMenu();
                    }, 400);
                });
            });

            // Click outside to close
            document.addEventListener('click', function(e) {
                if (!menu.contains(e.target)) {
                    closeMenu();
                }
            });

            // Keyboard accessibility
            toggle.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    toggleMenu();
                }
            });

            itemButtons.forEach(btn => {
                btn.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        this.click();
                    }
                    if (e.key === 'Escape') {
                        closeMenu();
                    }
                });
            });

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && isOpen) {
                    closeMenu();
                    toggle.focus();
                }
            });

            // Auto-open demo on load
            setTimeout(() => {
                openMenu();
                setTimeout(() => {
                    closeMenu();
                }, 2500);
            }, 500);

        })();
    </script>

</body>
</html>
