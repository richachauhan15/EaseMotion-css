<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS-only Interactive Radial Action Menu</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Interactive Radial Action Menu</h1>
      <p>Hover over the center button to reveal quick actions.</p>
      <div class="radial-menu">
        <button class="menu-btn">+</button>
        <a href="#" class="action action1">🏠</a>
        <a href="#" class="action action2">💬</a>
        <a href="#" class="action action3">❤️</a>
        <a href="#" class="action action4">⚙️</a>
        <a href="#" class="action action5">⭐</a>
        <a href="#" class="action action6">📧</a>
      </div>
    </div>
  </body>
</html>
