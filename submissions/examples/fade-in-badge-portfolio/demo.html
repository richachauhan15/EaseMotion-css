<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creative Portfolio - Fade-In Badge Showcase</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="portfolio-badge-canvas">
    <div class="portfolio-card-frame">
      
      <div class="card-meta-header">
        <span class="category-tag">SYSTEM METRICS</span>
        <h3>Terminal Task Manager</h3>
      </div>

      <div class="badge-display-area">
        <!-- Pure CSS Fade-In Badge -->
        <div class="fade-in-badge">
          <span class="badge-status-dot"></span>
          <span class="badge-text-content">MongoDB Certified</span>
        </div>
      </div>

      <p class="panel-caption-footer">Badge smoothly fades into view with a subtle vertical translation on layout load.</p>
    </div>
  </main>

</body>
</html>
