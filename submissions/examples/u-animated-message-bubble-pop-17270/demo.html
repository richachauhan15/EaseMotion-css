<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Message Bubble Pop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">

    <h1>Animated Message Bubble Pop</h1>

    <p class="intro">
      A reusable chat bubble animation for messaging apps,
      support systems, collaboration tools, and social platforms.
    </p>

    <div class="chat-window">

      <div class="message incoming">
        Hello! Welcome to EaseMotion CSS.
      </div>

      <div class="message outgoing">
        Thanks! The animations look amazing.
      </div>

      <div class="message incoming pop">
        🎉 New message received!
      </div>

      <div class="message outgoing">
        I'll save this component for my project.
      </div>

    </div>

  </main>

</body>
</html>
