<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expandable Sidebar · Collapse with Icons</title>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- === EXPANDABLE SIDEBAR === -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-brand">
                <i class="fas fa-rocket"></i>
                <span class="brand-text">DashBoard</span>
            </div>
            <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
                <i class="fas fa-chevron-left"></i>
            </button>
        </div>

        <nav class="sidebar-nav">
            <ul class="sidebar-menu">
                <li>
                    <a href="#" class="sidebar-link active">
                        <i class="fas fa-home"></i>
                        <span class="link-text">Dashboard</span>
                    </a>
                </li>
                <li>
                    <a href="#" class="sidebar-link">
                        <i class="fas fa-chart-pie"></i>
                        <span class="link-text">Analytics</span>
                    </a>
                </li>
                <li>
                    <a href="#" class="sidebar-link">
                        <i class="fas fa-users"></i>
                        <span class="link-text">Team</span>
                    </a>
                </li>
                <li>
                    <a href="#" class="sidebar-link">
                        <i class="fas fa-envelope"></i>
                        <span class="link-text">Messages</span>
                        <span class="badge">3</span>
                    </a>
                </li>
                <li>
                    <a href="#" class="sidebar-link">
                        <i class="fas fa-cog"></i>
                        <span class="link-text">Settings</span>
                    </a>
                </li>
            </ul>
        </nav>

        <div class="sidebar-footer">
            <a href="#" class="sidebar-link">
                <i class="fas fa-sign-out-alt"></i>
                <span class="link-text">Logout</span>
            </a>
        </div>
    </aside>

    <!-- === MAIN CONTENT === -->
    <main class="main-content" id="mainContent">
        <div class="content-card">
            <h2>📂 Expandable Sidebar</h2>
            <p class="sub">collapses with icon only</p>

            <div class="content-preview">
                <div class="preview-item">
                    <i class="fas fa-chevron-circle-left"></i>
                    <p>Click the toggle button to collapse the sidebar</p>
                </div>
            </div>

            <p style="margin-top: 1.5rem; font-size: 0.85rem; color: #64748b;">
                Click toggle · watch the sidebar collapse to icons only
            </p>
        </div>
    </main>

    <!-- Embedded JavaScript -->
    <script>
        (function() {
            'use strict';

            const sidebar = document.getElementById('sidebar');
            const toggle = document.getElementById('sidebarToggle');
            const mainContent = document.getElementById('mainContent');
            const icon = toggle.querySelector('i');

            let isCollapsed = false;

            // --- Toggle Sidebar ---
            function toggleSidebar() {
                isCollapsed = !isCollapsed;
                sidebar.classList.toggle('collapsed', isCollapsed);

                // Change toggle icon
                if (isCollapsed) {
                    icon.className = 'fas fa-chevron-right';
                    toggle.setAttribute('aria-label', 'Expand sidebar');
                } else {
                    icon.className = 'fas fa-chevron-left';
                    toggle.setAttribute('aria-label', 'Collapse sidebar');
                }

                console.log(`📂 Sidebar ${isCollapsed ? 'collapsed' : 'expanded'}`);
            }

            // --- Event Listeners ---

            // Toggle button
            toggle.addEventListener('click', function(e) {
                e.stopPropagation();
                toggleSidebar();
                this.classList.add('click-pulse');
                setTimeout(() => {
                    this.classList.remove('click-pulse');
                }, 300);
            });

            // Keyboard accessibility
            toggle.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    toggleSidebar();
                }
            });

            // Sidebar links with tooltip on collapse
            const links = document.querySelectorAll('.sidebar-link');
            links.forEach(link => {
                link.addEventListener('click', function(e) {
                    // Remove active class from all links
                    links.forEach(l => l.classList.remove('active'));
                    this.classList.add('active');

                    // Click feedback
                    this.classList.add('clicked');
                    setTimeout(() => {
                        this.classList.remove('clicked');
                    }, 200);

                    const text = this.querySelector('.link-text')?.textContent || 'Item';
                    console.log(`📂 Navigated to: ${text}`);
                });

                // Keyboard accessibility
                link.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        this.click();
                    }
                });
            });

            // Auto-collapse demo on load
            setTimeout(() => {
                toggleSidebar();
                setTimeout(() => {
                    toggleSidebar();
                }, 2500);
            }, 500);

            console.log('📂 Expandable sidebar initialized!');

        })();
    </script>

</body>
</html>
