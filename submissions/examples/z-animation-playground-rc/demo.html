<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Animation Playground</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>Interactive Animation Playground</h1>

    <div class="controls">

        <div class="control-group">
            <label>Animation</label>
            <select id="animation">
                <option value="fadeIn">Fade In</option>
                <option value="slideLeft">Slide Left</option>
                <option value="slideRight">Slide Right</option>
                <option value="zoomIn">Zoom In</option>
                <option value="rotateIn">Rotate In</option>
            </select>
        </div>

        <div class="control-group">
            <label>Duration (seconds)</label>
            <input type="range" id="duration" min="0.5" max="5" step="0.5" value="1">
            <span id="durationValue">1s</span>
        </div>

        <div class="control-group">
            <label>Delay (seconds)</label>
            <input type="range" id="delay" min="0" max="3" step="0.5" value="0">
            <span id="delayValue">0s</span>
        </div>

        <div class="control-group">
            <label>Iterations</label>
            <input type="number" id="iterations" value="1" min="1" max="10">
        </div>

        <div class="control-group">
            <label>Easing</label>
            <select id="easing">
                <option>ease</option>
                <option>linear</option>
                <option>ease-in</option>
                <option>ease-out</option>
                <option>ease-in-out</option>
            </select>
        </div>

        <button id="playBtn">Play Animation</button>
        <button id="copyBtn">Copy CSS</button>

    </div>

    <div class="preview-area">
        <div id="previewBox">Animate Me</div>
    </div>

    <div class="generated-css">
        <h3>Generated CSS</h3>
        <pre id="cssOutput"></pre>
    </div>

</div>

<script>

const playBtn = document.getElementById("playBtn");
const copyBtn = document.getElementById("copyBtn");

const animation = document.getElementById("animation");
const duration = document.getElementById("duration");
const delay = document.getElementById("delay");
const iterations = document.getElementById("iterations");
const easing = document.getElementById("easing");

const previewBox = document.getElementById("previewBox");

const durationValue = document.getElementById("durationValue");
const delayValue = document.getElementById("delayValue");

const cssOutput = document.getElementById("cssOutput");

duration.addEventListener("input", () => {
    durationValue.textContent = duration.value + "s";
});

delay.addEventListener("input", () => {
    delayValue.textContent = delay.value + "s";
});

function updateCSS() {

    const css = `
animation-name: ${animation.value};
animation-duration: ${duration.value}s;
animation-delay: ${delay.value}s;
animation-timing-function: ${easing.value};
animation-iteration-count: ${iterations.value};
`;

    cssOutput.textContent = css;
}

updateCSS();

playBtn.addEventListener("click", () => {

    previewBox.style.animation = "none";
    void previewBox.offsetWidth;

    previewBox.style.animation =
        `${animation.value} ${duration.value}s ${easing.value} ${delay.value}s ${iterations.value}`;
    
    updateCSS();
});

copyBtn.addEventListener("click", () => {

    navigator.clipboard.writeText(cssOutput.textContent);

    copyBtn.textContent = "Copied!";

    setTimeout(() => {
        copyBtn.textContent = "Copy CSS";
    }, 1500);
});

</script>

</body>
</html>
