<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Application Secret Rotation Tracker</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="dashboard">

<h2>Application Secret Rotation</h2>

<div class="secret healthy">
<div>
<h3>Database Credentials</h3>
<p>Rotated successfully 2 days ago</p>
</div>
<span>Healthy</span>
</div>

<div class="secret active">
<div>
<h3>API Access Tokens</h3>
<p>Automatic rotation currently running</p>
</div>
<span>Rotating</span>
</div>

<div class="secret warning">
<div>
<h3>Service Account Keys</h3>
<p>Rotation due within 3 days</p>
</div>
<span>Due Soon</span>
</div>

<div class="secret critical">
<div>
<h3>Encryption Keys</h3>
<p>Rotation overdue by 12 days</p>
</div>
<span>Expired</span>
</div>

</section>

</body>
</html>
