<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Word Carousel - EaseMotion CSS</title>
    <link rel="stylesheet" href="../../easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Word Carousel Component</h1>
        
        <section class="demo-section">
            <h2>Default Speed (3s)</h2>
            <p class="carousel-text">
                We are
                <span class="ease-word-carousel">
                    <span class="carousel-word">innovative</span>
                    <span class="carousel-word">creative</span>
                    <span class="carousel-word">dynamic</span>
                </span>
            </p>
        </section>

        <section class="demo-section">
            <h2>Fast Speed (2s)</h2>
            <p class="carousel-text carousel-fast">
                Building
                <span class="ease-word-carousel carousel-fast">
                    <span class="carousel-word">amazing</span>
                    <span class="carousel-word">powerful</span>
                    <span class="carousel-word">beautiful</span>
                </span>
                experiences
            </p>
        </section>

        <section class="demo-section">
            <h2>Slow Speed (5s)</h2>
            <p class="carousel-text carousel-slow">
                The future is
                <span class="ease-word-carousel carousel-slow">
                    <span class="carousel-word">now</span>
                    <span class="carousel-word">here</span>
                    <span class="carousel-word">bright</span>
                </span>
            </p>
        </section>

        <section class="demo-section">
            <h2>Hero Tagline Example</h2>
            <div class="hero-tagline">
                <h3>
                    <span class="ease-word-carousel carousel-hero">
                        <span class="carousel-word">Create</span>
                        <span class="carousel-word">Inspire</span>
                        <span class="carousel-word">Elevate</span>
                    </span>
                    beautiful animations
                </h3>
            </div>
        </section>
    </div>
</body>
</html>
