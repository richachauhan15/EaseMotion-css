<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hover Zoom Card · Image Zoom with Text Overlay</title>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="card">
        <h2>🖼️ Hover Zoom Card</h2>
        <p class="sub">image zooms with text overlay on hover</p>

        <!-- === HOVER ZOOM CARD === -->
        <div class="zoom-card" id="zoomCard">
            <div class="zoom-image-wrapper">
                <img src="https://picsum.photos/seed/1/400/300" alt="Beautiful landscape" class="zoom-image" />
                <div class="zoom-overlay">
                    <div class="zoom-content">
                        <h3>Explore the World</h3>
                        <p>Discover breathtaking landscapes and hidden gems</p>
                        <span class="zoom-tag">Adventure</span>
                    </div>
                </div>
            </div>
            <div class="zoom-footer">
                <span class="zoom-category"><i class="fas fa-map-marker-alt"></i> Travel</span>
                <span class="zoom-likes"><i class="fas fa-heart"></i> 2.4k</span>
            </div>
        </div>

        <p style="margin-top: 2rem; font-size: 0.85rem; color: #64748b;">
            Hover · watch the image zoom with a text overlay
        </p>
    </div>

    <!-- Embedded JavaScript -->
    <script>
        (function() {
            'use strict';

            const card = document.getElementById('zoomCard');

            if (card) {
                // Click feedback
                card.addEventListener('click', function(e) {
                    this.classList.add('click-pulse');
                    setTimeout(() => {
                        this.classList.remove('click-pulse');
                    }, 300);
                    console.log('🖼️ Zoom card clicked!');
                });

                // Keyboard accessibility
                card.setAttribute('tabindex', '0');
                card.setAttribute('role', 'button');
                card.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        this.click();
                    }
                });
            }

        })();
    </script>

</body>
</html>
