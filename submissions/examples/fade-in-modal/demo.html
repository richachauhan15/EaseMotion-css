<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - Fade In Modal</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="demo-container">
        <h1>CSS Fade-In Modal</h1>
        <p>Accessible modal animation using pure HTML and CSS.</p>

        <button class="open-btn">Open Modal</button>

        <div class="modal">
            <div class="modal-content">
                <button class="close-btn">&times;</button>

                <h2>Fade-In Modal</h2>
                <p>
                    This modal uses smooth CSS fade-in animation
                    with no JavaScript dependency.
                </p>

                <button class="action-btn">Continue</button>
            </div>
        </div>

    </main>

</body>
</html>
