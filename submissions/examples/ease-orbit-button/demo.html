<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orbit Button · Orbiting Dots Effect</title>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="card">
        <h2>🪐 Orbit Button</h2>
        <p class="sub">small dots orbit around it on hover</p>

        <!-- === ORBIT BUTTON === -->
        <div class="orbit-container">
            <button class="orbit-btn" id="orbitButton">
                <!-- Orbiting dots -->
                <span class="orbit-dot dot-1"></span>
                <span class="orbit-dot dot-2"></span>
                <span class="orbit-dot dot-3"></span>
                <span class="orbit-dot dot-4"></span>
                <span class="orbit-dot dot-5"></span>
                <span class="orbit-dot dot-6"></span>
                <span class="orbit-dot dot-7"></span>
                <span class="orbit-dot dot-8"></span>

                <!-- Button content -->
                <span class="btn-content">
                    <i class="fas fa-rocket"></i>
                    <span>Launch</span>
                </span>
            </button>
        </div>

        <p style="margin-top: 2rem; font-size: 0.85rem; color: #64748b;">
            Hover · watch the dots orbit around the button
        </p>
    </div>

    <!-- Embedded JavaScript -->
    <script>
        (function() {
            'use strict';

            const button = document.getElementById('orbitButton');
            const dots = document.querySelectorAll('.orbit-dot');

            if (button) {
                // Click feedback
                button.addEventListener('click', function(e) {
                    this.classList.add('click-pulse');
                    setTimeout(() => {
                        this.classList.remove('click-pulse');
                    }, 300);

                    // Trigger orbit burst
                    dots.forEach(dot => {
                        dot.classList.remove('orbiting');
                        void dot.offsetWidth;
                        dot.classList.add('orbiting');
                    });

                    console.log('🚀 Orbit launched!');
                });

                // Mouse enter - start orbiting
                button.addEventListener('mouseenter', function() {
                    dots.forEach(dot => {
                        if (!dot.classList.contains('orbiting')) {
                            dot.classList.add('orbiting');
                        }
                    });
                });

                // Mouse leave - stop orbiting
                button.addEventListener('mouseleave', function() {
                    dots.forEach(dot => {
                        dot.classList.remove('orbiting');
                    });
                });

                // Trigger initial orbit on load for demo
                setTimeout(() => {
                    dots.forEach(dot => {
                        dot.classList.add('orbiting');
                    });
                    setTimeout(() => {
                        dots.forEach(dot => {
                            dot.classList.remove('orbiting');
                        });
                    }, 3000);
                }, 500);

                // Keyboard accessibility
                button.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        this.click();
                    }
                });
            }

        })();
    </script>

</body>
</html>
