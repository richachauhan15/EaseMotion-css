<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blur Entrance Progress Bar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Blur Entrance Progress Bar</h1>

    <div class="progress">
        <div class="progress-fill"
             role="progressbar"
             aria-valuemin="0"
             aria-valuemax="100"
             aria-valuenow="80">
            <span>80%</span>
        </div>
    </div>
</div>

</body>
</html>
