<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Shimmer-Sweep Hero Section Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="portfolio-hero-bg-sap">
  <section class="hero-container-sap">
    
    <div class="hero-glow-sap"></div>
    <div class="hero-content-sap">
      <div class="hero-badge-sap">
        <span class="badge-dot-sap"></span>
        <span class="badge-text-sap">AVAILABLE FOR FREELANCE & CONTRACTS</span>
      </div>

      <h1 class="hero-headline-sap">
        CRAFTING DIGITAL <br>
        <span class="shimmer-text-sap" data-text="EXPERIENCES & INTERFACES">EXPERIENCES & INTERFACES</span>
      </h1>

      <p class="hero-subtext-sap">
        A lightweight, performance-first studio layout showcasing interactive web graphics, kinetic typography, and fluid CSS animations.
      </p>
      <div class="hero-actions-sap">
        <a href="#projects" class="btn-primary-sap">
          <span class="btn-text-sap">VIEW FEATURED WORK</span>
          <div class="shimmer-sweep-sap"></div>
        </a>
        
        <a href="#contact" class="btn-secondary-sap">
          GET IN TOUCH
        </a>
      </div>

    </div>

  </section>

</body>
</html>
