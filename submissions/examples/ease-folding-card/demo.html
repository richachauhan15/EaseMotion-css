<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Folding Card · 3D Paper Fold Effect</title>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="card">
        <h2>📄 Folding Card</h2>
        <p class="sub">folds like paper in 3D on hover</p>

        <!-- === FOLDING CARD === -->
        <div class="fold-container" id="foldContainer">
            <div class="fold-card">
                <!-- Front face -->
                <div class="fold-front">
                    <div class="fold-content">
                        <i class="fas fa-envelope"></i>
                        <h3>Open Me</h3>
                        <p>Hover to unfold</p>
                    </div>
                </div>

                <!-- Back face (revealed when folded) -->
                <div class="fold-back">
                    <div class="fold-content">
                        <i class="fas fa-check-circle"></i>
                        <h3>Surprise!</h3>
                        <p>You found the hidden message</p>
                    </div>
                </div>

                <!-- Fold line -->
                <div class="fold-line"></div>
            </div>
        </div>

        <p style="margin-top: 2rem; font-size: 0.85rem; color: #64748b;">
            Hover · watch the card fold like paper in 3D
        </p>
    </div>

    <!-- Embedded JavaScript -->
    <script>
        (function() {
            'use strict';

            const container = document.getElementById('foldContainer');
            const card = container.querySelector('.fold-card');

            if (card) {
                // Click to toggle fold
                container.addEventListener('click', function(e) {
                    card.classList.toggle('folded');
                    card.classList.add('click-pulse');
                    setTimeout(() => {
                        card.classList.remove('click-pulse');
                    }, 300);
                    console.log('📄 Card folded:', card.classList.contains('folded'));
                });

                // Hover to fold/unfold
                container.addEventListener('mouseenter', function() {
                    card.classList.add('folded');
                });

                container.addEventListener('mouseleave', function() {
                    card.classList.remove('folded');
                });

                // Keyboard accessibility
                container.setAttribute('tabindex', '0');
                container.setAttribute('role', 'button');
                container.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        card.classList.toggle('folded');
                    }
                });

                // Trigger initial fold on load for demo
                setTimeout(() => {
                    card.classList.add('folded');
                    setTimeout(() => {
                        card.classList.remove('folded');
                    }, 2500);
                }, 500);
            }

        })();
    </script>

</body>
</html>
