<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perspective Nav · 3D Depth on Hover</title>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="card">
        <h2>🎯 Perspective Nav</h2>
        <p class="sub">3D depth on hover</p>

        <!-- === PERSPECTIVE NAV === -->
        <nav class="perspective-nav" id="perspectiveNav">
            <ul class="nav-items">
                <li class="nav-item">
                    <a href="#" class="nav-link" data-text="Home">
                        <i class="fas fa-home"></i>
                        <span>Home</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link" data-text="Explore">
                        <i class="fas fa-compass"></i>
                        <span>Explore</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link" data-text="Gallery">
                        <i class="fas fa-images"></i>
                        <span>Gallery</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link" data-text="Blog">
                        <i class="fas fa-blog"></i>
                        <span>Blog</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link" data-text="Contact">
                        <i class="fas fa-envelope"></i>
                        <span>Contact</span>
                    </a>
                </li>
            </ul>
        </nav>

        <p style="margin-top: 2rem; font-size: 0.85rem; color: #64748b;">
            Hover · watch each item pop with 3D depth
        </p>
    </div>

    <!-- Embedded JavaScript -->
    <script>
        (function() {
            'use strict';

            const links = document.querySelectorAll('.nav-link');

            links.forEach(link => {
                // Click feedback
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    this.classList.add('clicked');
                    setTimeout(() => {
                        this.classList.remove('clicked');
                    }, 300);
                    const text = this.querySelector('span')?.textContent || 'Item';
                    console.log(`🎯 Navigated to: ${text}`);
                });

                // Keyboard accessibility
                link.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        this.click();
                    }
                });

                // Track hover for 3D effect
                link.addEventListener('mouseenter', function() {
                    this.style.transition = 'transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1)';
                });
            });

            console.log('🎯 Perspective nav initialized!');

        })();
    </script>

</body>
</html>
