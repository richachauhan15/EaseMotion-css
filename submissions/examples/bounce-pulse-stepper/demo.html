<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Bounce-Pulse Stepper - EaseMotion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="dashboard-wrapper">
        <header class="dashboard-header">
            <h1>Campaign Creation</h1>
            <p>Hover over the steps to see the pure CSS bounce, watch the active step pulse!</p>
        </header>

        <div class="em-stepper-container">
            <!-- Step 1: Completed -->
            <div class="em-step completed">
                <div class="em-step-indicator">
                    <span class="em-step-icon">✓</span>
                </div>
                <div class="em-step-content">
                    <h3>Audience</h3>
                    <p>Target demographics</p>
                </div>
            </div>

            <!-- Step 2: Completed -->
            <div class="em-step completed">
                <div class="em-step-indicator">
                    <span class="em-step-icon">✓</span>
                </div>
                <div class="em-step-content">
                    <h3>Budget</h3>
                    <p>Funding allocated</p>
                </div>
            </div>

            <!-- Step 3: Active -->
            <div class="em-step active">
                <div class="em-step-indicator">
                    <span class="em-step-icon">3</span>
                </div>
                <div class="em-step-content">
                    <h3>Creatives</h3>
                    <p>Upload ad media</p>
                </div>
            </div>
            
            <!-- Step 4: Pending -->
            <div class="em-step pending">
                <div class="em-step-indicator">
                    <span class="em-step-icon">4</span>
                </div>
                <div class="em-step-content">
                    <h3>Review</h3>
                    <p>Final approval</p>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
