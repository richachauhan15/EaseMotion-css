<!DOCTYPE html>
<html lang="en">
<head>

  <title>Keyboard Shortcut Ribbon</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="shortcut-ribbon" aria-label="Keyboard shortcuts">

      <kbd>K</kbd>

  </section>
</body>
</html>
