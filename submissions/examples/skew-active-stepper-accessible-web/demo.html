<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Skew-Active Stepper Demo — Accessible Web</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { font-family: -apple-system, "Segoe UI", sans-serif; min-height: 100vh; padding: 60px 20px; margin: 0; background: #f9fafb; }
    h2 { color: #111827; text-align: center; }
  </style>
</head>
<body>
  <h2>CSS Skew-Active Stepper — Accessible Web</h2>

  <div class="ease-stepper" role="list" aria-label="Checkout steps">
    <div class="ease-stepper__step is-complete" role="listitem" aria-current="false">
      <div class="ease-stepper__circle">✓</div>
      <div class="ease-stepper__label">Cart</div>
    </div>
    <div class="ease-stepper__line"></div>
    <div class="ease-stepper__step is-active" role="listitem" aria-current="step">
      <div class="ease-stepper__circle">2</div>
      <div class="ease-stepper__label">Shipping</div>
    </div>
    <div class="ease-stepper__line"></div>
    <div class="ease-stepper__step" role="listitem" aria-current="false">
      <div class="ease-stepper__circle">3</div>
      <div class="ease-stepper__label">Payment</div>
    </div>
  </div>
</body>
</html>
