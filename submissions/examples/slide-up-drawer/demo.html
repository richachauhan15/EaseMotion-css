<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide-Up Drawer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="drawer-container">

    <input type="checkbox" id="drawer-toggle">

    <label for="drawer-toggle" class="drawer-btn">
        Open Drawer
    </label>

    <div class="overlay"></div>

    <div class="drawer">
        <h2>Slide-Up Drawer</h2>
        <p>
            This is a pure HTML & CSS drawer that slides from the bottom
            with smooth animation.
        </p>

        <label for="drawer-toggle" class="close-btn">
            Close
        </label>
    </div>

</div>

</body>
</html>
