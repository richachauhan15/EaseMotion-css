<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Skew-Active Progress Bar Demo — Accessible Web</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { font-family: -apple-system, "Segoe UI", sans-serif; min-height: 100vh; padding: 60px 20px; margin: 0; background: #f9fafb; }
    h2 { color: #111827; text-align: center; }
  </style>
</head>
<body>
  <h2>CSS Skew-Active Progress Bar — Accessible Web</h2>

  <div class="ease-progress">
    <div class="ease-progress__label">
      <span>Upload Progress</span>
      <span id="progressValue">65%</span>
    </div>
    <div class="ease-progress__track" role="progressbar" aria-valuenow="65" aria-valuemin="0" aria-valuemax="100" aria-label="Upload progress">
      <div class="ease-progress__fill" id="progressFill" style="width: 65%;"></div>
    </div>
  </div>

  <script>
    const fill = document.getElementById('progressFill');
    requestAnimationFrame(() => {
      setTimeout(() => fill.classList.add('is-settled'), 50);
    });
  </script>
</body>
</html>
