<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Popcorn Nav · Sequential Pop Effect</title>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="card">
        <h2>🍿 Popcorn Nav</h2>
        <p class="sub">items pop out sequentially</p>

        <!-- === POPCORN NAV === -->
        <nav class="popcorn-nav" id="popcornNav">
            <button class="popcorn-toggle" id="popcornToggle" aria-label="Toggle menu">
                <i class="fas fa-bars"></i>
            </button>

            <ul class="popcorn-items" id="popcornItems">
                <li>
                    <a href="#" class="popcorn-link" data-tooltip="Home">
                        <i class="fas fa-home"></i>
                        <span>Home</span>
                    </a>
                </li>
                <li>
                    <a href="#" class="popcorn-link" data-tooltip="Explore">
                        <i class="fas fa-compass"></i>
                        <span>Explore</span>
                    </a>
                </li>
                <li>
                    <a href="#" class="popcorn-link" data-tooltip="Gallery">
                        <i class="fas fa-images"></i>
                        <span>Gallery</span>
                    </a>
                </li>
                <li>
                    <a href="#" class="popcorn-link" data-tooltip="Blog">
                        <i class="fas fa-blog"></i>
                        <span>Blog</span>
                    </a>
                </li>
                <li>
                    <a href="#" class="popcorn-link" data-tooltip="Contact">
                        <i class="fas fa-envelope"></i>
                        <span>Contact</span>
                    </a>
                </li>
            </ul>
        </nav>

        <p style="margin-top: 2rem; font-size: 0.85rem; color: #64748b;">
            Click · watch items pop out like popcorn
        </p>
    </div>

    <!-- Embedded JavaScript -->
    <script>
        (function() {
            'use strict';

            const nav = document.getElementById('popcornNav');
            const toggle = document.getElementById('popcornToggle');
            const items = document.getElementById('popcornItems');
            const links = document.querySelectorAll('.popcorn-link');
            let isOpen = false;

            // --- Toggle Menu ---
            function toggleMenu() {
                isOpen = !isOpen;
                nav.classList.toggle('is-open', isOpen);
                toggle.classList.toggle('is-active', isOpen);

                const icon = toggle.querySelector('i');
                if (isOpen) {
                    icon.className = 'fas fa-times';
                } else {
                    icon.className = 'fas fa-bars';
                }

                console.log(`🍿 Popcorn nav ${isOpen ? 'opened' : 'closed'}`);
            }

            // --- Open Menu ---
            function openMenu() {
                if (isOpen) return;
                toggleMenu();
            }

            // --- Close Menu ---
            function closeMenu() {
                if (!isOpen) return;
                toggleMenu();
            }

            // --- Event Listeners ---

            // Toggle button
            toggle.addEventListener('click', function(e) {
                e.stopPropagation();
                toggleMenu();
                this.classList.add('click-pulse');
                setTimeout(() => {
                    this.classList.remove('click-pulse');
                }, 300);
            });

            // Link clicks
            links.forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    const label = this.getAttribute('data-tooltip') || 'Item';
                    console.log(`🍿 Selected: ${label}`);

                    this.classList.add('clicked');
                    setTimeout(() => {
                        this.classList.remove('clicked');
                    }, 400);

                    setTimeout(() => {
                        closeMenu();
                    }, 500);
                });
            });

            // Click outside to close
            document.addEventListener('click', function(e) {
                if (!nav.contains(e.target)) {
                    closeMenu();
                }
            });

            // Keyboard accessibility
            toggle.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    toggleMenu();
                }
            });

            links.forEach(link => {
                link.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        this.click();
                    }
                    if (e.key === 'Escape') {
                        closeMenu();
                    }
                });
            });

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && isOpen) {
                    closeMenu();
                    toggle.focus();
                }
            });

            // Auto-open demo on load
            setTimeout(() => {
                openMenu();
                setTimeout(() => {
                    closeMenu();
                }, 3000);
            }, 500);

        })();
    </script>

</body>
</html>
