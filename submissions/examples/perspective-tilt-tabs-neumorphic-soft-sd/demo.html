<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perspective Tilt Tabs Demo</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #eef0f4;
        font-family: system-ui, sans-serif;
      }
      .perspective-tilt-tabs {
        width: 480px;
        max-width: 94vw;
      }
    </style>
  </head>
  <body>
    <div class="perspective-tilt-tabs">
      <input type="radio" name="t" id="t1" checked />
      <label for="t1">Home</label>
      <input type="radio" name="t" id="t2" />
      <label for="t2">Gallery</label>
      <input type="radio" name="t" id="t3" />
      <label for="t3">Settings</label>
      <div class="tab-content">Home content with soft neumorphic styling.</div>
      <div class="tab-content">Gallery tab with a subtle 3D tilt effect.</div>
      <div class="tab-content">Settings panel, no JavaScript needed.</div>
    </div>
  </body>
</html>
