<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animation Comparison Showcase</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="container">

    <h1>Interactive Animation Comparison Showcase</h1>

    <p class="intro">
        Hover over each card to preview a different animation style.
    </p>

    <div class="grid">

        <div class="card fade">
            <h3>Fade In</h3>
            <p>Smooth opacity transition.</p>
        </div>

        <div class="card slide">
            <h3>Slide In</h3>
            <p>Moves gently into view.</p>
        </div>

        <div class="card bounce">
            <h3>Bounce</h3>
            <p>Playful attention-grabbing motion.</p>
        </div>

        <div class="card zoom">
            <h3>Zoom</h3>
            <p>Subtle scale effect.</p>
        </div>

        <div class="card rotate">
            <h3>Rotate</h3>
            <p>Rotation-based interaction.</p>
        </div>

    </div>

</div>

</body>
</html>
