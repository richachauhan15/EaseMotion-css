<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkbox Print Optimization Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2>Checkbox Print Optimization</h2>
    <p>This component strips heavy colors and shadows when printed to save ink.</p>
    
    <label class="checkbox-label">
      <input type="checkbox" class="custom-checkbox" checked>
      <span>Optimized Checkbox (Checked)</span>
    </label>
  </div>
</body>
</html>
