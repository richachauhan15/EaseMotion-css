<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elastic Slide Stepper</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<section class="container">

<h1>Elastic Slide Stepper</h1>

<div class="stepper">

<div class="step">
  <div class="circle">1</div>
  <div class="content">
    <h3>Planning</h3>
    <p>Create project structure and ideas.</p>
  </div>
</div>


<div class="step">
  <div class="circle">2</div>
  <div class="content">
    <h3>Development</h3>
    <p>Build and improve the project.</p>
  </div>
</div>


<div class="step">
  <div class="circle">3</div>
  <div class="content">
    <h3>Deployment</h3>
    <p>Release the final product.</p>
  </div>
</div>

</div>

</section>

</body>
</html>
