<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Magnet Nav · Items Attract Cursor</title>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="card">
        <h2>🧲 Magnet Nav</h2>
        <p class="sub">items attract cursor</p>

        <!-- === MAGNET NAV === -->
        <nav class="magnet-nav" id="magnetNav">
            <ul class="magnet-items">
                <li class="magnet-item">
                    <a href="#" class="magnet-link" data-tooltip="Home">
                        <i class="fas fa-home"></i>
                        <span>Home</span>
                    </a>
                </li>
                <li class="magnet-item">
                    <a href="#" class="magnet-link" data-tooltip="Explore">
                        <i class="fas fa-compass"></i>
                        <span>Explore</span>
                    </a>
                </li>
                <li class="magnet-item">
                    <a href="#" class="magnet-link" data-tooltip="Gallery">
                        <i class="fas fa-images"></i>
                        <span>Gallery</span>
                    </a>
                </li>
                <li class="magnet-item">
                    <a href="#" class="magnet-link" data-tooltip="Blog">
                        <i class="fas fa-blog"></i>
                        <span>Blog</span>
                    </a>
                </li>
                <li class="magnet-item">
                    <a href="#" class="magnet-link" data-tooltip="Contact">
                        <i class="fas fa-envelope"></i>
                        <span>Contact</span>
                    </a>
                </li>
            </ul>
        </nav>

        <p style="margin-top: 2rem; font-size: 0.85rem; color: #64748b;">
            Hover · watch items attract your cursor
        </p>
    </div>

    <!-- Embedded JavaScript -->
    <script>
        (function() {
            'use strict';

            const items = document.querySelectorAll('.magnet-item');

            // --- Magnet effect ---
            items.forEach(item => {
                const link = item.querySelector('.magnet-link');
                let isHovering = false;

                item.addEventListener('mouseenter', function(e) {
                    isHovering = true;
                    this.classList.add('active');
                });

                item.addEventListener('mouseleave', function(e) {
                    isHovering = false;
                    this.classList.remove('active');
                    // Reset transform
                    link.style.transform = 'translate(0, 0) scale(1)';
                });

                item.addEventListener('mousemove', function(e) {
                    if (!isHovering) return;

                    const rect = this.getBoundingClientRect();
                    const centerX = rect.left + rect.width / 2;
                    const centerY = rect.top + rect.height / 2;

                    // Calculate distance from cursor to center
                    const deltaX = e.clientX - centerX;
                    const deltaY = e.clientY - centerY;

                    // Magnetic pull - stronger when closer
                    const maxDistance = 150;
                    const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
                    const strength = Math.max(0, 1 - distance / maxDistance);

                    // Apply magnetic pull with easing
                    const pullX = deltaX * strength * 0.3;
                    const pullY = deltaY * strength * 0.3;
                    const scale = 1 + strength * 0.08;

                    link.style.transform = `translate(${pullX}px, ${pullY}px) scale(${scale})`;
                    link.style.transition = 'transform 0.1s ease-out';
                });

                // Click feedback
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    this.classList.add('clicked');
                    setTimeout(() => {
                        this.classList.remove('clicked');
                    }, 300);
                    const label = this.getAttribute('data-tooltip') || 'Item';
                    console.log(`🧲 Attracted to: ${label}`);
                });

                // Keyboard accessibility
                link.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        this.click();
                    }
                });
            });

            console.log('🧲 Magnet nav initialized!');

        })();
    </script>

</body>
</html>
