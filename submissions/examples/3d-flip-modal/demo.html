<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Flip Modal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <input type="checkbox" id="modal-toggle">

    <label for="modal-toggle" class="open-btn">
        Open Modal
    </label>

    <div class="overlay"></div>

    <div class="modal">
        <div class="modal-content">
            <h2>3D Flip Modal</h2>
            <p>
                A smooth CSS powered modal with a 3D flip animation effect.
            </p>

            <label for="modal-toggle" class="close-btn">
                Close
            </label>
        </div>
    </div>

</div>

</body>
</html>
