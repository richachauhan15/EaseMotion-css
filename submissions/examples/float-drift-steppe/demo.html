<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Float Drift Stepper</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="stepper-container">
  <h1>Float Drift Stepper</h1>

  <div class="stepper">

    <div class="step active">
      <span>1</span>
      <div>
        <h3>Design</h3>
        <p>Create your project idea.</p>
      </div>
    </div>

    <div class="step">
      <span>2</span>
      <div>
        <h3>Develop</h3>
        <p>Build the implementation.</p>
      </div>
    </div>

    <div class="step">
      <span>3</span>
      <div>
        <h3>Launch</h3>
        <p>Deploy and share your work.</p>
      </div>
    </div>

  </div>

</section>

</body>
</html>
