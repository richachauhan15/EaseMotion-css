<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skew-Active Carousel - Product Catalog</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="carousel-section">

    <h1>Featured Products</h1>

    <div class="carousel" tabindex="0">

        <article class="card active">

            <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=600"
                 alt="Running Shoes">

            <h2>Running Shoes</h2>

            <p>$129</p>

        </article>

        <article class="card">

            <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=600"
                 alt="Smart Watch">

            <h2>Smart Watch</h2>

            <p>$249</p>

        </article>

        <article class="card">

            <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=600"
                 alt="Headphones">

            <h2>Wireless Headphones</h2>

            <p>$189</p>

        </article>

        <article class="card">

            <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=600"
                 alt="Smartphone">

            <h2>Smartphone</h2>

            <p>$899</p>

        </article>

    </div>

</section>

</body>
</html>
