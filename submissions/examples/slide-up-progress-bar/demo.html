<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Slide-Up Progress Bar</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>CSS Slide-Up Progress Bar</h1>

<div class="progress-container">

    <div class="progress-bar"
    role="progressbar"
    aria-valuemin="0"
    aria-valuemax="100"
    aria-valuenow="70">

        <span>70%</span>

    </div>

</div>

</div>

</body>
</html>
