<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slice Button · Split & Reveal</title>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="card">
        <h2>✂️ Slice Button</h2>
        <p class="sub">splits into two halves · reveals hidden text</p>

        <!-- === SLICE BUTTON === -->
        <button class="slice-btn" id="sliceButton">
            <!-- Top half (slides up) -->
            <span class="slice-half slice-top">
                <span class="slice-content">
                    <i class="fas fa-cut"></i>
                    <span>Hover</span>
                </span>
            </span>

            <!-- Bottom half (slides down) -->
            <span class="slice-half slice-bottom">
                <span class="slice-content">
                    <i class="fas fa-cut"></i>
                    <span>Hover</span>
                </span>
            </span>

            <!-- Hidden text revealed after split -->
            <span class="slice-reveal">
                <i class="fas fa-scissors"></i>
                <span>Slice!</span>
            </span>
        </button>

        <p style="margin-top: 2rem; font-size: 0.85rem; color: #64748b;">
            Hover · watch the button split and reveal the hidden message
        </p>
    </div>

    <!-- Embedded JavaScript -->
    <script>
        (function() {
            'use strict';

            const button = document.getElementById('sliceButton');

            if (button) {
                // Click feedback
                button.addEventListener('click', function(e) {
                    this.classList.add('click-pulse');
                    setTimeout(() => {
                        this.classList.remove('click-pulse');
                    }, 300);

                    // Reset and replay animation
                    const topHalf = this.querySelector('.slice-top');
                    const bottomHalf = this.querySelector('.slice-bottom');
                    const reveal = this.querySelector('.slice-reveal');

                    // Remove animation classes
                    topHalf.classList.remove('slice-open');
                    bottomHalf.classList.remove('slice-open');
                    reveal.classList.remove('reveal-show');

                    // Force reflow
                    void topHalf.offsetWidth;

                    // Re-add animation classes
                    topHalf.classList.add('slice-open');
                    bottomHalf.classList.add('slice-open');
                    reveal.classList.add('reveal-show');

                    console.log('✂️ Button sliced!');
                });

                // Trigger initial animation on load for demo
                setTimeout(() => {
                    const topHalf = button.querySelector('.slice-top');
                    const bottomHalf = button.querySelector('.slice-bottom');
                    const reveal = button.querySelector('.slice-reveal');

                    if (topHalf) topHalf.classList.add('slice-open');
                    if (bottomHalf) bottomHalf.classList.add('slice-open');
                    if (reveal) reveal.classList.add('reveal-show');
                }, 500);

                // Reset on mouse leave (optional - uncomment for reset)
                // button.addEventListener('mouseleave', function() {
                //     const topHalf = this.querySelector('.slice-top');
                //     const bottomHalf = this.querySelector('.slice-bottom');
                //     const reveal = this.querySelector('.slice-reveal');
                //
                //     topHalf.classList.remove('slice-open');
                //     bottomHalf.classList.remove('slice-open');
                //     reveal.classList.remove('reveal-show');
                // });
            }

        })();
    </script>

</body>
</html>
