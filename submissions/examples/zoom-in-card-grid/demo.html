<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoom-In Card Grid</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="zi-grid">

    <div class="zi-card">
        <h3>HTML5</h3>
        <p>Semantic and responsive structure.</p>
    </div>

    <div class="zi-card">
        <h3>CSS3</h3>
        <p>Smooth zoom animation on hover.</p>
    </div>

    <div class="zi-card">
        <h3>Responsive</h3>
        <p>Automatically adapts to all devices.</p>
    </div>

    <div class="zi-card">
        <h3>Performance</h3>
        <p>Uses GPU accelerated transforms.</p>
    </div>

    <div class="zi-card">
        <h3>Accessibility</h3>
        <p>Supports reduced motion settings.</p>
    </div>

    <div class="zi-card">
        <h3>EaseMotion</h3>
        <p>Lightweight reusable animation component.</p>
    </div>

</section>

</body>
</html>
