<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Popcorn Button · Popping Dots Effect</title>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="card">
        <h2>🍿 Popcorn Button</h2>
        <p class="sub">small dots pop outward on hover</p>

        <!-- === POPCORN BUTTON === -->
        <button class="popcorn-btn" id="popcornButton">
            <!-- Popping dots -->
            <span class="dot dot-1"></span>
            <span class="dot dot-2"></span>
            <span class="dot dot-3"></span>
            <span class="dot dot-4"></span>
            <span class="dot dot-5"></span>
            <span class="dot dot-6"></span>
            <span class="dot dot-7"></span>
            <span class="dot dot-8"></span>
            <span class="dot dot-9"></span>
            <span class="dot dot-10"></span>
            <span class="dot dot-11"></span>
            <span class="dot dot-12"></span>

            <!-- Button content -->
            <span class="btn-content">
                <i class="fas fa-popcorn"></i>
                <span>Pop!</span>
            </span>
        </button>

        <p style="margin-top: 2rem; font-size: 0.85rem; color: #64748b;">
            Hover · watch the dots pop outward like popcorn
        </p>
    </div>

    <!-- Embedded JavaScript -->
    <script>
        (function() {
            'use strict';

            const button = document.getElementById('popcornButton');

            if (button) {
                // Click feedback - trigger pop
                button.addEventListener('click', function(e) {
                    this.classList.add('click-pulse');
                    setTimeout(() => {
                        this.classList.remove('click-pulse');
                    }, 300);

                    // Trigger dot pop
                    const dots = this.querySelectorAll('.dot');
                    dots.forEach(dot => {
                        dot.classList.remove('popping');
                        void dot.offsetWidth;
                        dot.classList.add('popping');
                    });

                    console.log('🍿 Popcorn popped!');
                });

                // Mouse enter - pop dots
                button.addEventListener('mouseenter', function() {
                    const dots = this.querySelectorAll('.dot');
                    dots.forEach(dot => {
                        if (!dot.classList.contains('popping')) {
                            dot.classList.add('popping');
                        }
                    });
                });

                // Mouse leave - reset dots
                button.addEventListener('mouseleave', function() {
                    const dots = this.querySelectorAll('.dot');
                    dots.forEach(dot => {
                        dot.classList.remove('popping');
                    });
                });

                // Trigger initial pop on load for demo
                setTimeout(() => {
                    const dots = button.querySelectorAll('.dot');
                    dots.forEach(dot => {
                        dot.classList.add('popping');
                    });
                    setTimeout(() => {
                        dots.forEach(dot => {
                            dot.classList.remove('popping');
                        });
                    }, 1500);
                }, 500);

                // Keyboard accessibility
                button.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        this.click();
                    }
                });
            }

        })();
    </script>

</body>
</html>
