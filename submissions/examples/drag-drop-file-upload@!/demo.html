<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drag & Drop File Upload - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS CDN -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css"
  />
  
  <!-- Custom Styles for this example -->
  <link rel="stylesheet" href="style.css" />
</head>
<body class="ease-min-h-screen ease-bg-gradient-to-br ease-from-slate-900 ease-via-purple-950 ease-to-slate-900 ease-flex ease-items-center ease-justify-center ease-p-8 ease-font-sans">
  
  <main class="ease-w-full ease-max-w-2xl ease-fade-in">
    <div class="ease-text-center ease-mb-8">
      <h1 class="ease-text-3xl ease-font-bold ease-text-white ease-mb-2">Upload Files</h1>
      <p class="ease-text-slate-400">Drag and drop or click to browse</p>
    </div>

    <!-- Upload Container -->
    <div class="upload-container">
      
      <!-- Drop Zone -->
      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" class="drop-zone__input" multiple accept="image/*,.pdf,.doc,.docx" />
        <label for="fileInput" class="drop-zone__label">
          <div class="drop-zone__icon">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="17 8 12 3 7 8"></polyline>
              <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
          </div>
          <h3 class="drop-zone__title">Drag & Drop files here</h3>
          <p class="drop-zone__subtitle">or click to browse</p>
          <div class="drop-zone__formats">
            <span class="format-tag">Images</span>
            <span class="format-tag">PDF</span>
            <span class="format-tag">Documents</span>
          </div>
          <p class="drop-zone__limit">Max file size: 10MB</p>
        </label>
      </div>

      <!-- File List -->
      <div class="file-list" id="fileList">
        <!-- Files will be added here dynamically -->
      </div>

      <!-- Upload Actions -->
      <div class="upload-actions" id="uploadActions">
        <button class="btn btn--secondary" id="clearBtn">
          <span>Clear All</span>
        </button>
        <button class="btn btn--primary" id="uploadBtn">
          <span class="btn__text">Upload Files</span>
          <span class="btn__loader"></span>
        </button>
      </div>

    </div>

    <!-- Success Message -->
    <div class="success-message" id="successMessage">
      <div class="success-icon">✓</div>
      <h3>Upload Complete!</h3>
      <p>Your files have been successfully uploaded.</p>
    </div>

  </main>

  <script>
    // File Upload Functionality
    class FileUpload {
      constructor() {
        this.dropZone = document.getElementById('dropZone');
        this.fileInput = document.getElementById('fileInput');
        this.fileList = document.getElementById('fileList');
        this.uploadActions = document.getElementById('uploadActions');
        this.clearBtn = document.getElementById('clearBtn');
        this.uploadBtn = document.getElementById('uploadBtn');
        this.successMessage = document.getElementById('successMessage');
        
        this.files = [];
        this.maxFileSize = 10 * 1024 * 1024; // 10MB
        
        this.init();
      }
      
      init() {
        // Drag and drop events
        this.dropZone.addEventListener('dragover', (e) => this.handleDragOver(e));
        this.dropZone.addEventListener('dragleave', (e) => this.handleDragLeave(e));
        this.dropZone.addEventListener('drop', (e) => this.handleDrop(e));
        
        // File input change
        this.fileInput.addEventListener('change', (e) => this.handleFileSelect(e));
        
        // Button events
        this.clearBtn.addEventListener('click', () => this.clearFiles());
        this.uploadBtn.addEventListener('click', () => this.uploadFiles());
      }
      
      handleDragOver(e) {
        e.preventDefault();
        this.dropZone.classList.add('drop-zone--active');
      }
      
      handleDragLeave(e) {
        e.preventDefault();
        this.dropZone.classList.remove('drop-zone--active');
      }
      
      handleDrop(e) {
        e.preventDefault();
        this.dropZone.classList.remove('drop-zone--active');
        
        const files = Array.from(e.dataTransfer.files);
        this.processFiles(files);
      }
      
      handleFileSelect(e) {
        const files = Array.from(e.target.files);
        this.processFiles(files);
      }
      
      processFiles(files) {
        files.forEach(file => {
          // Validate file size
          if (file.size > this.maxFileSize) {
            this.showError(`File "${file.name}" is too large. Max size is 10MB.`);
            return;
          }
          
          // Check if file already exists
          if (this.files.find(f => f.name === file.name && f.size === file.size)) {
            this.showError(`File "${file.name}" already added.`);
            return;
          }
          
          this.files.push(file);
          this.addFileToList(file);
        });
        
        this.updateUI();
      }
      
      addFileToList(file) {
        const fileItem = document.createElement('div');
        fileItem.className = 'file-item ease-fade-in';
        fileItem.dataset.fileName = file.name;
        
        const isImage = file.type.startsWith('image/');
        const fileSize = this.formatFileSize(file.size);
        const fileIcon = this.getFileIcon(file.type);
        
        fileItem.innerHTML = `
          <div class="file-item__preview">
            ${isImage ? `<img src="${URL.createObjectURL(file)}" alt="${file.name}" class="file-item__image" />` : `<div class="file-item__icon">${fileIcon}</div>`}
          </div>
          <div class="file-item__info">
            <h4 class="file-item__name">${file.name}</h4>
            <p class="file-item__size">${fileSize}</p>
            <div class="file-item__progress">
              <div class="progress-bar">
                <div class="progress-bar__fill"></div>
              </div>
            </div>
          </div>
          <button class="file-item__remove" aria-label="Remove file">×</button>
        `;
        
        // Remove button event
        const removeBtn = fileItem.querySelector('.file-item__remove');
        removeBtn.addEventListener('click', () => this.removeFile(file.name));
        
        this.fileList.appendChild(fileItem);
      }
      
      removeFile(fileName) {
        this.files = this.files.filter(f => f.name !== fileName);
        
        const fileItem = this.fileList.querySelector(`[data-file-name="${fileName}"]`);
        if (fileItem) {
          fileItem.classList.add('file-item--removing');
          setTimeout(() => fileItem.remove(), 300);
        }
        
        this.updateUI();
      }
      
      clearFiles() {
        this.files = [];
        this.fileList.innerHTML = '';
        this.fileInput.value = '';
        this.updateUI();
      }
      
      updateUI() {
        const hasFiles = this.files.length > 0;
        this.uploadActions.style.display = hasFiles ? 'flex' : 'none';
      }
      
      uploadFiles() {
        if (this.files.length === 0) return;
        
        // Show loading state
        this.uploadBtn.classList.add('btn--loading');
        this.uploadBtn.disabled = true;
        
        // Simulate upload progress
        const fileItems = this.fileList.querySelectorAll('.file-item');
        let completedFiles = 0;
        
        fileItems.forEach((item, index) => {
          const progressBar = item.querySelector('.progress-bar__fill');
          
          setTimeout(() => {
            let progress = 0;
            const interval = setInterval(() => {
              progress += 10;
              progressBar.style.width = `${progress}%`;
              
              if (progress >= 100) {
                clearInterval(interval);
                completedFiles++;
                
                if (completedFiles === fileItems.length) {
                  this.showSuccess();
                }
              }
            }, 100);
          }, index * 200);
        });
      }
      
      showSuccess() {
        setTimeout(() => {
          this.uploadBtn.classList.remove('btn--loading');
          this.uploadBtn.disabled = false;
          this.successMessage.classList.add('success-message--visible');
          
          setTimeout(() => {
            this.clearFiles();
            this.successMessage.classList.remove('success-message--visible');
          }, 3000);
        }, 500);
      }
      
      showError(message) {
        // You could implement a toast notification here
        console.error(message);
        alert(message);
      }
      
      formatFileSize(bytes) {
        if (bytes === 0) return '0 Bytes';
        const k = 1024;
        const sizes = ['Bytes', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
      }
      
      getFileIcon(type) {
        if (type.includes('pdf')) return '📄';
        if (type.includes('word') || type.includes('document')) return '📝';
        if (type.includes('excel') || type.includes('spreadsheet')) return '📊';
        if (type.includes('zip') || type.includes('archive')) return '🗜️';
        return '📎';
      }
    }
    
    // Initialize file upload
    const fileUpload = new FileUpload();
  </script>
</body>
</html>
