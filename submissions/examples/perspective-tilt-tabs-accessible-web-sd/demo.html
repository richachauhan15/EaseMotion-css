<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perspective Tilt Tabs</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: #f5f5f5;
      }
      .perspective-tilt-tabs {
        max-width: 40em;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div class="perspective-tilt-tabs">
      <input type="radio" name="tabs" id="tab1" checked />
      <label for="tab1">Overview</label>
      <input type="radio" name="tabs" id="tab2" />
      <label for="tab2">Settings</label>
      <input type="radio" name="tabs" id="tab3" />
      <label for="tab3">Support</label>
      <div class="tab-panel">
        <h2>Overview</h2>
        <p>Accessible content with subtle 3D tilt indicators.</p>
      </div>
      <div class="tab-panel">
        <h2>Settings</h2>
        <p>Configure preferences with keyboard-friendly controls.</p>
      </div>
      <div class="tab-panel">
        <h2>Support</h2>
        <p>Help and resources for accessible web layouts.</p>
      </div>
    </div>
  </body>
</html>
