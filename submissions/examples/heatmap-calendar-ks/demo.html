<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>Activity Heatmap Calendar</title>
  <link rel="stylesheet" href="style.css">
</head>

    <section class="heatmap-section" aria-labelledby="heatmap-title">
      <h1 id="heatmap-title" class="heatmap-title">Activity Heatmap Calendar</h1>

      <div class="heatmap" role="img" aria-label="Activity heatmap showing 365 days of contributions">
        <div class="heatmap-stats">
          <div class="stats-summary">
            <span class="stats-count" aria-label="365 total activities">365</span>
            <span class="stats-label">activities in the last year</span>
          </div>
          <div class="stats-range" aria-label="Longest streak 14 days">
            <svg class="stats-icon" viewBox="0 0 16 16" width="16" height="16" aria-hidden="true">
              <path fill="currentColor" d="M7.293 1.707a1 1 0 011.414 0l2.586 2.586a1 1 0 010 1.414l-2.586 2.586a1 1 0 01-1.414-1.414L8.414 6H5a3 3 0 000 6h3a1 1 0 010 2H5A5 5 0 015 4h3.414L7.293 2.707a1 1 0 010-1.414z"/>
            </svg>
            <span>Longest streak: <strong>14 days</strong></span>
          </div>
        </div>

        <div class="heatmap-legend" role="group" aria-label="Color intensity legend">
          <span class="legend-label">Less</span>
          <div class="legend-cells" aria-hidden="true">
            <span class="legend-cell level-0"></span>
            <span class="legend-cell level-1"></span>
            <span class="legend-cell level-2"></span>
            <span class="legend-cell level-3"></span>
            <span class="legend-cell level-4"></span>
          </div>
          <span class="legend-label">More</span>
        </div>

        <div class="heatmap-body">
          <div class="heatmap-scroll" role="grid" aria-label="Activity calendar grid" tabindex="0">
            <div class="day-labels" aria-hidden="true">
              <span class="day-label">Mon</span>
              <span class="day-label"></span>
              <span class="day-label">Wed</span>
              <span class="day-label"></span>
              <span class="day-label">Fri</span>
              <span class="day-label"></span>
              <span class="day-label">Sun</span>
            </div>

            <div class="month-labels" role="row" aria-hidden="true">
              <span class="month-label" style="--col-start:1;--col-span:5">Jan</span>
              <span class="month-label" style="--col-start:6;--col-span:4">Feb</span>
              <span class="month-label" style="--col-start:10;--col-span:5">Mar</span>
