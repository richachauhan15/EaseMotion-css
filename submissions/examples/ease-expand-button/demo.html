<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expand Button · Search Bar Expansion</title>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="card">
        <h2>🔍 Expand Button</h2>
        <p class="sub">expands into a full search bar on click</p>

        <!-- === EXPAND BUTTON === -->
        <div class="expand-container">
            <button class="expand-btn" id="expandButton">
                <i class="fas fa-search"></i>
                <span class="expand-text">Search</span>
            </button>

            <!-- Expanded search bar -->
            <div class="search-bar" id="searchBar">
                <i class="fas fa-search search-icon"></i>
                <input type="text" class="search-input" placeholder="Type to search..." />
                <button class="search-close" id="searchClose">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </div>

        <p style="margin-top: 2rem; font-size: 0.85rem; color: #64748b;">
            Click · watch the button expand into a full search bar
        </p>
    </div>

    <!-- Embedded JavaScript -->
    <script>
        (function() {
            'use strict';

            const expandBtn = document.getElementById('expandButton');
            const searchBar = document.getElementById('searchBar');
            const searchInput = document.querySelector('.search-input');
            const closeBtn = document.getElementById('searchClose');
            const container = document.querySelector('.expand-container');

            let isExpanded = false;

            // --- Expand function ---
            function expandSearch() {
                if (isExpanded) return;
                isExpanded = true;

                // Add expanded class to container
                container.classList.add('expanded');

                // Focus input after animation
                setTimeout(() => {
                    searchInput.focus();
                }, 600);

                console.log('🔍 Search expanded!');
            }

            // --- Collapse function ---
            function collapseSearch() {
                if (!isExpanded) return;
                isExpanded = false;

                // Remove expanded class
                container.classList.remove('expanded');

                // Clear input
                searchInput.value = '';

                console.log('🔍 Search collapsed');
            }

            // --- Event Listeners ---

            // Click expand button
            expandBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                expandSearch();
            });

            // Click close button
            closeBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                collapseSearch();
            });

            // Press Escape key
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && isExpanded) {
                    collapseSearch();
                    // Return focus to expand button
                    setTimeout(() => expandBtn.focus(), 100);
                }
            });

            // Click outside to close
            document.addEventListener('click', function(e) {
                if (isExpanded && !container.contains(e.target)) {
                    collapseSearch();
                }
            });

            // Enter key to search (demo)
            searchInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    const query = this.value.trim();
                    if (query) {
                        console.log(`🔍 Searching for: "${query}"`);
                        // Demo: show alert
                        alert(`Searching for: "${query}"`);
                        collapseSearch();
                    }
                }
            });

            // --- Keyboard accessibility ---
            expandBtn.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    expandSearch();
                }
            });

            closeBtn.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    collapseSearch();
                }
            });

            // --- Trigger initial expansion on load for demo ---
            setTimeout(() => {
                expandSearch();
                setTimeout(() => {
                    collapseSearch();
                }, 2500);
            }, 500);

        })();
    </script>

</body>
</html>
