<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shutter Button · Camera Aperture Effect</title>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="card">
        <h2>📷 Shutter Button</h2>
        <p class="sub">opens like a camera aperture on hover</p>

        <!-- === SHUTTER BUTTON === -->
        <div class="shutter-container">
            <button class="shutter-btn" id="shutterButton">
                <!-- Aperture blades -->
                <div class="aperture">
                    <div class="blade blade-1"></div>
                    <div class="blade blade-2"></div>
                    <div class="blade blade-3"></div>
                    <div class="blade blade-4"></div>
                    <div class="blade blade-5"></div>
                    <div class="blade blade-6"></div>
                    <div class="blade blade-7"></div>
                    <div class="blade blade-8"></div>
                </div>

                <!-- Button content -->
                <span class="shutter-content">
                    <i class="fas fa-camera"></i>
                    <span>Capture</span>
                </span>
            </button>
        </div>

        <p style="margin-top: 2rem; font-size: 0.85rem; color: #64748b;">
            Hover · watch the aperture open like a camera lens
        </p>
    </div>

    <!-- Embedded JavaScript -->
    <script>
        (function() {
            'use strict';

            const button = document.getElementById('shutterButton');

            if (button) {
                // Click feedback with shutter sound effect (visual only)
                button.addEventListener('click', function(e) {
                    this.classList.add('click-pulse');
                    setTimeout(() => {
                        this.classList.remove('click-pulse');
                    }, 300);

                    // Reset and replay aperture animation
                    const blades = this.querySelectorAll('.blade');
                    const aperture = this.querySelector('.aperture');

                    blades.forEach(blade => {
                        blade.classList.remove('open');
                        void blade.offsetWidth;
                        blade.classList.add('open');
                    });

                    // Flash effect
                    aperture.classList.remove('flash');
                    void aperture.offsetWidth;
                    aperture.classList.add('flash');

                    setTimeout(() => {
                        aperture.classList.remove('flash');
                    }, 300);

                    console.log('📷 Shutter clicked!');
                });

                // Trigger initial animation on load for demo
                setTimeout(() => {
                    const blades = button.querySelectorAll('.blade');
                    blades.forEach(blade => {
                        blade.classList.add('open');
                    });
                    setTimeout(() => {
                        blades.forEach(blade => {
                            blade.classList.remove('open');
                        });
                    }, 1500);
                }, 500);

                // Mouse enter - open aperture
                button.addEventListener('mouseenter', function() {
                    const blades = this.querySelectorAll('.blade');
                    blades.forEach(blade => {
                        if (!blade.classList.contains('open')) {
                            blade.classList.add('open');
                        }
                    });
                });

                // Mouse leave - close aperture
                button.addEventListener('mouseleave', function() {
                    const blades = this.querySelectorAll('.blade');
                    blades.forEach(blade => {
                        blade.classList.remove('open');
                    });
                });
            }

        })();
    </script>

</body>
</html>
