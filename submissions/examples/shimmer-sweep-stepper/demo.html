<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Shimmer-Sweep Stepper - EaseMotion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="dashboard-wrapper">
        <header class="dashboard-header">
            <h1>Onboarding Progress</h1>
            <p>Hover over the steps to see the pure CSS shimmer-sweep effect.</p>
        </header>

        <div class="em-stepper-container">
            <!-- Step 1: Completed -->
            <div class="em-step completed">
                <div class="em-step-indicator">
                    <span class="em-step-icon">✓</span>
                    <div class="em-shimmer"></div>
                </div>
                <div class="em-step-content">
                    <h3>Account Setup</h3>
                    <p>Basic details</p>
                </div>
            </div>

            <!-- Step 2: Active -->
            <div class="em-step active">
                <div class="em-step-indicator">
                    <span class="em-step-icon">2</span>
                    <div class="em-shimmer"></div>
                </div>
                <div class="em-step-content">
                    <h3>Preferences</h3>
                    <p>Customize dashboard</p>
                </div>
            </div>

            <!-- Step 3: Pending -->
            <div class="em-step pending">
                <div class="em-step-indicator">
                    <span class="em-step-icon">3</span>
                    <div class="em-shimmer"></div>
                </div>
                <div class="em-step-content">
                    <h3>Integration</h3>
                    <p>Connect APIs</p>
                </div>
            </div>
            
            <!-- Step 4: Pending -->
            <div class="em-step pending">
                <div class="em-step-indicator">
                    <span class="em-step-icon">4</span>
                    <div class="em-shimmer"></div>
                </div>
                <div class="em-step-content">
                    <h3>Go Live</h3>
                    <p>Launch project</p>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
